[workspace]
name = "mnc"
channels = [
    "file:///tmp/ecoscope-workflows-custom/release/artifacts/",
    'https://repo.prefix.dev/ecoscope-workflows/',
    'https://repo.prefix.dev/ecoscope-workflows-custom/',
    'conda-forge',
]
platforms = ['linux-64', 'osx-arm64','win-64']

[dependencies]
curl = "*"
rattler-build = "*"
yq = "*"
hatch = "*"
pip="*"
hatch-vcs="*"
setuptools="*"
playwright = ">=1.58.2,<2"
virtualenv = "20.39.0.*"

[feature.compile.dependencies]
# Include this if you add new tasks and the package has been built

ecoscope-workflows-ext-mnc = "*"
ecoscope-workflows-ext-ste = "0.0.13.*"
ecoscope-workflows-core = "0.22.18.*"
ecoscope-workflows-ext-custom = "0.0.39.*"

[environments]
compile = { features = [
    "compile",
], solve-group = "compile", no-default-feature = true }

[tasks]
[tasks.build-release]
cmd = './publish/build.sh'

[tasks.pytest-310]
cmd = './dev/pytest-task.sh 310'

[tasks.pytest-311]
cmd = './dev/pytest-task.sh 311'

[tasks.pytest-312]
cmd = './dev/pytest-task.sh 312'

[feature.compile.tasks.compile-mara_north_event_report]
cmd = './dev/recompile.sh mara_north_event_report --install'
depends-on = ["build-release"]

[feature.compile.tasks.recompile-mara_north_event_report]
cmd = './dev/recompile.sh mara_north_event_report --no-install'
depends-on = ["build-release"]

[feature.compile.tasks.compile-livestock_monitoring]
cmd = './dev/recompile.sh livestock_monitoring --install'
depends-on = ["build-release"]

[feature.compile.tasks.recompile-livestock_monitoring]
cmd = './dev/recompile.sh livestock_monitoring --no-install'
depends-on = ["build-release"]

[feature.compile.tasks.compile-wildlife_monitoring_report]
cmd = './dev/recompile.sh wildlife_monitoring_report --install'
depends-on = ["build-release"]

[feature.compile.tasks.recompile-wildlife_monitoring_report]
cmd = './dev/recompile.sh wildlife_monitoring_report --no-install'
depends-on = ["build-release"]

[feature.compile.tasks.compile-logistics_report]
cmd = './dev/recompile.sh logistics_report --install'
depends-on = ["build-release"]

[feature.compile.tasks.recompile-logistics_report]
cmd = './dev/recompile.sh logistics_report --no-install'
depends-on = ["build-release"]

[feature.compile.tasks.compile-patrol_effort_report]
cmd = './dev/recompile.sh patrol_effort_report --install'
depends-on = ["build-release"]

[feature.compile.tasks.recompile-patrol_effort_report]
cmd = './dev/recompile.sh patrol_effort_report --no-install'
depends-on = ["build-release"]

[feature.compile.tasks.compile-tahmo_weather_report]
cmd = './dev/recompile.sh tahmo_weather_report --install'
depends-on = ["build-release"]

[feature.compile.tasks.recompile-tahmo_weather_report]
cmd = './dev/recompile.sh tahmo_weather_report --no-install'
depends-on = ["build-release"]
