id: mara_north_event_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.20.6.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.20.6.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.23.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.13.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.6.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
    
workflow:
  - name: Set workflow details
    id: workflow_details
    task: set_workflow_details

  - name: Time range
    id: time_range
    task: set_time_range
      
  - name: Set groupers
    id: groupers
    task: set_groupers
    partial: 
      groupers: []

  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  - name: Configure base map layers
    id: configure_base_maps
    task: set_base_maps_pydeck
    partial:
      base_maps:
        - url: >-
            https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
          opacity: 1
          max_zoom: 20

  - name: Download MNC template and persist
    id: persist_mnc_tpt
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/tx4fdlikfsijgw8jkugnr/mara_north_event_template.docx?rlkey=pvyu3y7ibpphbqlqc6u1pns3t&st=iuurvvfp&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Download MNC community conservancy boundaries
    id: persist_mnc_gpkg
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/14rcy4lkwp7xgewj3xf7k/mnc_conservancy.gpkg?rlkey=mtqo7ivxrnvjonm2z1zez6h6f&st=gtdi4vv0&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name: Download MNC Parcels gpkg
    id: download_mnc_parcels
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/33rdzy896rh91gtkfs2j3/mnc_across_the_river_parcels.gpkg?rlkey=xima1v0rozc0h9h78esfogx6q&st=o3gkk5p1&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name : Load community conservancy boundaries  
    id: load_comm_shp 
    task: load_df
    partial:
      file_path: ${{ workflow.persist_mnc_gpkg.return }}
      layer: null
      deserialize_json: false

  - name: Split loaded gdf by various grazing zones and blocks
    id: split_gdf_by_zone
    task: split_gdf_by_column
    partial:  
      gdf: ${{ workflow.load_comm_shp.return }}
      column: grazing_zone

  - name: Annotate community conservancy gpkg with geom type 
    id: annotate_comm_gdf_dict 
    task: annotate_gdf_dict_with_geom_type 
    partial:
      gdf_dict: ${{ workflow.split_gdf_by_zone.return }}

  - name: Create styled layers from split mnc zones
    id: create_mnc_styled_layers
    task: create_deckgl_layers_from_gdf_dict
    partial:
      gdf_dict: ${{ workflow.annotate_comm_gdf_dict.return }}
      styles:
        Conservancy:
          extruded: false
          get_fill_color: [169, 169, 169]
          get_line_color: [169, 169, 169]
          get_line_width: 4.00
          stroked: true
          filled: false
          opacity: 0.95

        Conservancy Herd Zone:
          extruded: false
          get_fill_color: [173, 255, 47]
          get_line_color: [173, 255, 47]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 1:
          extruded: false
          get_fill_color: [85, 107, 47]
          get_line_color: [85, 107, 47]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 2:
          extruded: false
          get_fill_color: [0, 139, 139]
          get_line_color: [0, 139, 139]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 3:
          extruded: false
          get_fill_color: [0, 100, 0]
          get_line_color: [0, 100, 0]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 4:
          extruded: false
          get_fill_color: [143, 188, 139]
          get_line_color: [143, 188, 139]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

      legends:
        title: Legend
        values: 
          - label: Conservancy
            color: "#a9a9a9"
          - label: Conservancy Herd Zone
            color: "#adff2f"
          - label: Grazing Zone 1
            color: "#556b2f"
          - label: Grazing Zone 2
            color: "#008b8b"
          - label: Grazing Zone 3
            color: "#006400"
          - label: Grazing Zone 4
            color: "#8fbc8b"

  - name: Create conservancy boundaries
    id: create_conservancy_boundaries
    task: create_deckgl_layers_from_gdf_dict
    partial:
      gdf_dict: ${{ workflow.annotate_comm_gdf_dict.return }}
      styles:
        Conservancy:
          extruded: false
          get_fill_color: [169, 169, 169]
          get_line_color: [169, 169, 169]
          get_line_width: 4.00
          stroked: true
          filled: false
          opacity: 0.95

      legends:
        title: Legend 
        values: 
          - label: Boundaries
            color: "#a9a9a9"

  - name: Create conservancy gdf from split dict 
    id: conservancy_gdf
    task: create_gdf_from_dict
    partial: 
      gdf_dict: ${{ workflow.split_gdf_by_zone.return }}
      key: Conservancy

  - name: Create group ranch gdf from loaded gdf
    id: overall_grazing_zones
    task: filter_df 
    partial: 
      column_name: grazing_zone
      op: ne
      value: Conservancy 
      df: ${{ workflow.load_comm_shp.return }}
      reset_index: false

  - name: Create conservancy text layers here 
    id: conservancy_text_layer
    task: create_custom_text_layer 
    partial: 
      geodataframe: ${{ workflow.conservancy_gdf.return }}
      layer_style: 
        get_text: name 
        get_color: [0,0,0,255]
        
        get_size: 1500
        size_units: meters 
        size_min_pixels: 70 #65 
        size_max_pixels: 100
        size_scale: 2.25 

        font_family: Calibri 
        font_weight: "700" 
        get_text_anchor: middle 
        get_alignment_baseline: center
        billboard: true 

        background_padding: [4,8]
        pickable: true 
        auto_highlight: false 
      use_centroid: true 
      legend: null 

  - name: Load mnc parcels 
    id: load_mnc_parcels 
    task: load_df 
    partial:
      file_path: ${{ workflow.download_mnc_parcels.return }}
      layer: null
      deserialize_json: false

  - name: Assign geom type to mnc parcels 
    id: assign_mnc_geom
    task: get_gdf_geom_type 
    partial:
      gdf: ${{ workflow.load_mnc_parcels.return }}

  - name: Create mnc parcels layers 
    id: create_mnc_parcels_layers 
    task: create_deckgl_layer_from_gdf 
    partial:
      gdf: ${{ workflow.assign_mnc_geom.return }}
      style: 
        extruded: false
        get_fill_color: [189, 183, 107]
        get_line_color: [189, 183, 107]
        get_line_width: 1.95
        stroked: true 
        filled: true 
        opacity: 0.15
      legend: 
        title: ""
        values: 
          - label: Parcels
            color: "#bdb76b"

  # 1. --- Weather report --- 
  - name: Retrieve weather observations from GMMF 
    id: subject_observations
    task: get_subjectgroup_observations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      raise_on_empty: false
      include_details: false
      include_subjectsource_details: false
      subject_group_name: "ER2ER - From GMMF"
  
  # Extract precipitation data
  - name: Extract precipitation data
    id: extract_precipitation
    task: extract_value_from_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.subject_observations.return }}
      column_name: extra__observation_details
      field_name_options:
        - precipitation
      output_type: float
      output_column_name: precipitation
  
  # Extract temperature data
  - name: Extract temperature data
    id: extract_temperature
    task: extract_value_from_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_precipitation.return }}
      column_name: extra__observation_details
      field_name_options:
        - surface_air_temperature
      output_type: float
      output_column_name: temperature
  
  # Extract wind speed data 
  - name: Extract wind speed data
    id: extract_wind_speed
    task: extract_value_from_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_temperature.return }}
      column_name: extra__observation_details
      field_name_options:
        - wind_speed
      output_type: float
      output_column_name: wind_speed

  # Extract wind gusts data 
  - name: Extract wind gusts data
    id: extract_wind_gusts
    task: extract_value_from_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_wind_speed.return }}
      column_name: extra__observation_details
      field_name_options:
        - wind_gusts
      output_type: float
      output_column_name: wind_gusts

    # Extract soil temperature data 
  - name: Extract soil temperature data
    id: extract_soil_temperature
    task: extract_value_from_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_wind_gusts.return }}
      column_name: extra__observation_details
      field_name_options:
        - soil_temperature
      output_type: float
      output_column_name: soil_temperature

    # Extract relative humidity data 
  - name: Extract relative humidity data
    id: extract_relative_humidity
    task: extract_value_from_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_soil_temperature.return }}
      column_name: extra__observation_details
      field_name_options:
        - relative_humidity
      output_type: float
      output_column_name: relative_humidity

    # Extract atmospheric pressure data
  - name: Extract atmospheric pressure data
    id: extract_pressure
    task: extract_value_from_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_relative_humidity.return }}
      column_name: extra__observation_details
      field_name_options:
        - atmospheric_pressure
      output_type: float
      output_column_name: atmospheric_pressure

  # Extract date
  - name: Extract date
    id: extract_date
    task: extract_column_as_type
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_pressure.return }}
      column_name: fixtime
      output_type: date
      output_column_name: date
  
  # Rename column
  - name: Rename value grouper columns
    id: rename_grouper_columns
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_date.return }}
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__subject__name: "weather_station"

  - name: Add temporal index
    id: df_with_temporal_index
    task: add_temporal_index
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.rename_grouper_columns.return }}
      time_col: fixtime
      cast_to_datetime: true
      groupers: ${{ workflow.groupers.return }}
      format: mixed 

  - name: Calculate weather summary table 
    id: daily_weather
    task: summarize_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.df_with_temporal_index.return }}
      groupby_cols:
        - weather_station
        - date
      summary_params:
        - display_name: precipitation
          aggregator: sum
          column: precipitation

        - display_name: temperature
          aggregator: mean
          column: temperature

        - display_name: wind_speed
          aggregator: mean
          column: wind_speed
        
        - display_name: wind_gusts
          aggregator: max
          column: wind_gusts
        
        - display_name: soil_temperature
          aggregator: mean 
          column: soil_temperature

        - display_name: relative_humidity
          aggregator: mean 
          column: relative_humidity

        - display_name: atmospheric_pressure
          aggregator: mean 
          column: atmospheric_pressure

      reset_index: true

  - name: Perist weather summary table 
    id: persist_weather_summary 
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.daily_weather.return }}
      filename: weather_summary_table

  # Draw weather charts and persist
  # Draw precipitation chart and persist
  - name: Draw precipitation chart
    id: precipitation_chart
    task: draw_line_chart
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: precipitation
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 20
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          showgrid: true
          gridcolor: "#e0e0e0"
          gridwidth: 1
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Precipitation (mm)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist precipitation chart as text
    id: persist_precipitation
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.precipitation_chart.return }}
      filename: precipitation_readings_over_time.html

  # Draw temperature chart ,persist
  - name: Draw temperature chart
    id: temperature_chart
    task: draw_line_chart
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 20
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist temperature chart as text
    id: persist_temperature
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.temperature_chart.return }}
      filename: temperature_readings_over_time.html

  # Draw wind speed  chart, persist and add widgets
  - name: Draw wind speed chart 
    id: wind_speed_chart
    task: draw_line_chart
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_speed
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 20
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average wind speed"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind speed chart as text
    id: persist_wind_speed
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_speed_chart.return }}
      filename: wind_speed_readings_over_time.html

  # Draw wind gusts  chart, persist and add widgets
  - name: Draw wind gusts chart 
    id: wind_gusts_chart
    task: draw_line_chart
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_gusts
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 20
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Max wind gusts"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind gusts chart as text
    id: persist_wind_gusts
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_gusts_chart.return }}
      filename: wind_gusts_readings_over_time.html

  # Draw soil temperature chart, persist and add widgets
  - name: Draw soil temperature chart 
    id: soil_temp_chart
    task: draw_line_chart
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: soil_temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 20
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist soil temperature chart as text
    id: persist_soil_temp
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.soil_temp_chart.return }}
      filename: soil_temperature_readings_over_time.html

  # Draw relative humidity and persist
  - name: Draw relative humidity chart
    id: rel_humidity_chart
    task: draw_line_chart
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: relative_humidity
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 20
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average humidity"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist relative humidity chart as text
    id: persist_rel_humidity
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.rel_humidity_chart.return }}
      filename: relative_humidity_readings_over_time.html

  # Draw atmospheric pressure and persist
  - name: Draw atmospheric pressure chart
    id: pressure_chart
    task: draw_line_chart
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: atmospheric_pressure
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 20
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average pressure"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist atmospheric pressure chart as text
    id: persist_pressure
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.pressure_chart.return }}
      filename: atmospheric_pressure_readings_over_time.html

  # 2. Events 
  - name: Retrieve all events 
    id: get_events_data
    task: get_events
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
        - patrols
      event_types: []
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: false

  # Extract date
  - name: Extract date from events data
    id: extract_event_date
    task: extract_column_as_type
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
