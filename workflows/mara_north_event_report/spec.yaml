id: mara_north_event_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.14.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.14.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.7.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "*"
    channel: file:///tmp/ecoscope-workflows-custom/release/artifacts/

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped
workflow:
  # set workflow details
  - name: Set workflow details
    id: workflow_details
    task: set_workflow_details

  # set time range
  - name: Time range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S %Z"
      timezone: 
        label: UTC 
        tzCode: UTC 
        name: UTC 
        utc_offset: "+00:00"

  # define groupers
  - name: Set groupers
    id: groupers
    task: set_groupers
    partial:
      groupers: []

  # connect to ER 
  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  # define base map layers
  - name: Configure base map layers
    id: configure_base_maps
    task: set_base_maps_pydeck

  # Download mnc template and persist
  - name: Download MNC template and persist
    id: persist_mnc_tpt
    task: download_file_and_persist
    partial:
      url: https://www.dropbox.com/scl/fi/zwb5d8nxfwqhjikjybmst/mara_north_template_2.docx?rlkey=it5d7a6382xyzgelh0cuy2xsy&st=zyi1ggdd&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  # Download mnc conservancies gpkg file and persist
  - name: Download MNC community conservancy boundaries
    id: persist_mnc_gpkg
    task: download_file_and_persist
    partial:
      url: https://www.dropbox.com/scl/fi/14rcy4lkwp7xgewj3xf7k/mnc_conservancy.gpkg?rlkey=mtqo7ivxrnvjonm2z1zez6h6f&st=55vxskq6&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name : Load local map files
    id: load_local_shapefiles 
    task: load_df
    partial:
      file_path: ${{ workflow.persist_mnc_gpkg.return }}
      layer: null
      deserialize_json: false

  - name: Split loaded gdf by various grazing zones and blocks
    id: split_gdf_by_zone
    task: split_gdf_by_column
    partial:  
      gdf: ${{ workflow.load_local_shapefiles.return }}
      column: grazing_zone

  # check if the legend will include these labels 
  - name: Create styled layers from split mnc zones
    id: create_mnc_styled_layers
    task: create_styled_layers_from_dict
    partial:
      gdf_dict: ${{ workflow.split_gdf_by_zone.return }}
      style_config:
        styles:
          Conservancy:
            extruded: false
            get_fill_color: [105, 105, 105, 200]
            get_line_color: [105, 105, 105, 200]
            get_line_width: 2.25
            stroked: true
            filled: false
            opacity: 0.95

          Conservancy Herd Zone:
            extruded: false
            get_fill_color: [173, 255, 47,200]
            get_line_color: [173, 255, 47,200]
            get_line_width: 2.25
            stroked: true
            filled: true
            opacity: 0.35

          Grazing Zone 1:
            extruded: false
            get_fill_color: [85, 107, 47,200]
            get_line_color: [85, 107, 47,200]
            get_line_width: 2.25
            stroked: true
            filled: true
            opacity: 0.35

          Grazing Zone 2:
            extruded: false
            get_fill_color: [0, 139, 139,200]
            get_line_color: [0, 139, 139,200]
            get_line_width: 2.25
            stroked: true
            filled: true
            opacity: 0.35

          Grazing Zone 3:
            extruded: false
            get_fill_color: [0, 100, 0,200]
            get_line_color: [0, 100, 0,200]
            get_line_width: 2.25
            stroked: true
            filled: true
            opacity: 0.35

          Grazing Zone 4:
            extruded: false
            get_fill_color: [143, 188, 139,200]
            get_line_color: [143, 188, 139,200]
            get_line_width: 2.25
            stroked: true
            filled: true
            opacity: 0.35

        legend:
          label: [ 
            "Conservancy boundaries","Conservancy herd zone", 
            "Grazing zone 1","Grazing zone 2", 
            "Grazing zone 3","Grazing zone 4"
            ]
          color: [
            "#696969","#adff2f","#556b2f","#008b8b",
            "#006400","#8fbc8b"
            ]

  - name: Create styled layers from split mnc zones
    id: create_conservancy_styled_layer
    task: create_styled_layers_from_dict
    partial:
      gdf_dict: ${{ workflow.split_gdf_by_zone.return }}
      style_config:
        styles:
          Conservancy:
            extruded: false
            get_fill_color: [105, 105, 105, 200]
            get_line_color: [105, 105, 105, 200]
            get_line_width: 2.25
            stroked: true
            filled: false
            opacity: 0.95

        legend:
          label: [ 
            "Conservancy boundaries"
            ]
          color: ["#696969"]

  - name: Create conservancy gdf from split dict 
    id: conservancy_gdf
    task: create_gdf_from_dict
    partial: 
      gdf_dict: ${{ workflow.split_gdf_by_zone.return }}
      key: Conservancy

  - name: Create group ranch gdf from loaded gdf
    id: overall_grazing_zones
    task: filter_df 
    partial: 
      column_name: grazing_zone
      op: ne
      value: Conservancy 
      df: ${{ workflow.load_local_shapefiles.return }}
      reset_index: false

  - name: Create text layer 
    id: custom_text_layer
    task: make_text_layer
    partial:
      txt_gdf: ${{ workflow.conservancy_gdf.return }}
      label_column: label
      fallback_columns:
        - name
      use_centroid: true 
      color: [0,0,0,255]
      size: 75
      font_family: Arial
      font_weight: normal
      background: false
      background_color: null
      background_padding: null
      text_anchor: middle
      alignment_baseline: center
      billboard: true
      pickable: true
      tooltip_columns:
        - label 
      target_crs: epsg:4326

  # 1. --- Weather report --- 
  - name: Get subject observations from ER 
    id: subject_observations
    task: get_subjectgroup_observations
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      raise_on_empty: false
      include_details: false
      include_subjectsource_details: false
  
  # Extract precipitation data
  - name: Extract precipitation data
    id: extract_precipitation
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.subject_observations.return }}
      column_name: extra__observation_details
      field_name_options:
        - precipitation
      output_type: float
      output_column_name: precipitation
  
  # Extract temperature data
  - name: Extract temperature data
    id: extract_temperature
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_precipitation.return }}
      column_name: extra__observation_details
      field_name_options:
        - surface_air_temperature
      output_type: float
      output_column_name: temperature
  
  # Extract wind speed data 
  - name: Extract wind speed data
    id: extract_wind_speed
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_temperature.return }}
      column_name: extra__observation_details
      field_name_options:
        - wind_speed
      output_type: float
      output_column_name: wind_speed

  # Extract wind gusts data 
  - name: Extract wind gusts data
    id: extract_wind_gusts
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_wind_speed.return }}
      column_name: extra__observation_details
      field_name_options:
        - wind_gusts
      output_type: float
      output_column_name: wind_gusts

    # Extract soil temperature data 
  - name: Extract soil temperature data
    id: extract_soil_temperature
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_wind_gusts.return }}
      column_name: extra__observation_details
      field_name_options:
        - soil_temperature
      output_type: float
      output_column_name: soil_temperature

    # Extract relative humidity data 
  - name: Extract relative humidity data
    id: extract_relative_humidity
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_soil_temperature.return }}
      column_name: extra__observation_details
      field_name_options:
        - relative_humidity
      output_type: float
      output_column_name: relative_humidity

    # Extract atmospheric pressure data
  - name: Extract atmospheric pressure data
    id: extract_pressure
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_relative_humidity.return }}
      column_name: extra__observation_details
      field_name_options:
        - atmospheric_pressure
      output_type: float
      output_column_name: atmospheric_pressure

  # Extract date
  - name: Extract date
    id: extract_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.extract_pressure.return }}
      column_name: fixtime
      output_type: date
      output_column_name: date
  
  # Rename column
  - name: Rename value grouper columns
    id: rename_grouper_columns
    task: map_columns
    partial:
      df: ${{ workflow.extract_date.return }}
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__subject__name: "weather_station"

  - name: Add temporal index
    id: df_with_temporal_index
    task: add_temporal_index
    partial:
      df: ${{ workflow.rename_grouper_columns.return }}
      time_col: fixtime
      cast_to_datetime: true
      groupers: ${{ workflow.groupers.return }}

  - name: Calculate weather summary table 
    id: daily_weather
    task: summarize_df
    partial:
      df: ${{ workflow.df_with_temporal_index.return }}
      groupby_cols:
        - weather_station
        - date
      summary_params:
        - display_name: precipitation
          aggregator: sum
          column: precipitation

        - display_name: temperature
          aggregator: mean
          column: temperature

        - display_name: wind_speed
          aggregator: mean
          column: wind_speed
        
        - display_name: wind_gusts
          aggregator: max
          column: wind_gusts
        
        - display_name: soil_temperature
          aggregator: mean 
          column: soil_temperature

        - display_name: relative_humidity
          aggregator: mean 
          column: relative_humidity

        - display_name: atmospheric_pressure
          aggregator: mean 
          column: atmospheric_pressure

      reset_index: true

  - name: Perist daily weather summary table 
    id: persist_daily_weather_summary 
    task: persist_df
    partial:  
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.daily_weather.return }}
      filename: weather_summary_table

  # Draw weather charts and persist -- later convert html to png and add them to word doc
  # Draw precipitation chart and persist
  - name: Draw precipitation chart
    id: precipitation_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: precipitation
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 16
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          showgrid: true
          gridcolor: "#e0e0e0"
          gridwidth: 1
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Precipitation (mm)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist precipitation chart as text
    id: persist_precipitation
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.precipitation_chart.return }}
      filename: precipitation_readings_over_time.html

  # Draw temperature chart ,persist
  - name: Draw temperature chart
    id: temperature_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 16
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist temperature chart as text
    id: persist_temperature
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.temperature_chart.return }}
      filename: temperature_readings_over_time.html

  # Draw wind speed  chart, persist and add widgets
  - name: Draw wind speed chart 
    id: wind_speed_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_speed
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 16
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average wind speed"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind speed chart as text
    id: persist_wind_speed
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_speed_chart.return }}
      filename: wind_speed_readings_over_time.html

  # Draw wind gusts  chart, persist and add widgets
  - name: Draw wind gusts chart 
    id: wind_gusts_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_gusts
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 16
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Max wind gusts"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind gusts chart as text
    id: persist_wind_gusts
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_gusts_chart.return }}
      filename: wind_gusts_readings_over_time.html

  # Draw soil temperature chart, persist and add widgets
  - name: Draw soil temperature chart 
    id: soil_temp_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: soil_temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 16
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist soil temperature chart as text
    id: persist_soil_temp
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.soil_temp_chart.return }}
      filename: soil_temperature_readings_over_time.html

  # Draw relative humidity and persist
  - name: Draw relative humidity chart
    id: rel_humidity_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: relative_humidity
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 16
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average humidity"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist relative humidity chart as text
    id: persist_rel_humidity
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.rel_humidity_chart.return }}
      filename: relative_humidity_readings_over_time.html

  # Draw atmospheric pressure and persist
  - name: Draw atmospheric pressure chart
    id: pressure_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: atmospheric_pressure
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 16
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average pressure"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist atmospheric pressure chart as text
    id: persist_pressure
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.pressure_chart.return }}
      filename: atmospheric_pressure_readings_over_time.html

  - name: Convert precipitation chart html to png 
    id: conv_precipitation_png 
    task: html_to_png 
    partial:
      html_path: ${{ workflow.persist_precipitation.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        wait_for_timeout: 50

  - name: Convert temperature chart html to png 
    id: conv_temperature_png 
    task: html_to_png 
    partial:
      html_path: ${{ workflow.persist_temperature.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        wait_for_timeout: 50

  - name: Convert wind speed chart html to png 
    id: conv_wind_speed_png 
    task: html_to_png 
    partial:
      html_path: ${{ workflow.persist_wind_speed.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        wait_for_timeout: 50

  - name: Convert wind gusts chart html to png 
    id: conv_wind_gusts_png 
    task: html_to_png 
    partial:
      html_path: ${{ workflow.persist_wind_gusts.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        wait_for_timeout: 50

  - name: Convert soil temp chart html to png 
    id: conv_soil_temp_png 
    task: html_to_png 
    partial:
      html_path: ${{ workflow.persist_soil_temp.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        wait_for_timeout: 50

  - name: Convert rel humidity chart html to png 
    id: conv_rel_humidity_png 
    task: html_to_png 
    partial:
      html_path: ${{ workflow.persist_rel_humidity.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        wait_for_timeout: 50

  - name: Convert pressure chart html to png 
    id: conv_pressure_png 
    task: html_to_png 
    partial:
      html_path: ${{ workflow.persist_pressure.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        wait_for_timeout: 50

  # 2. --- Patrol Efforts ---
  # Get all events 
  - name: Get events
    id: get_events_data
    task: get_events
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
      event_types: []
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
  
    # Extract date
  - name: Extract Date
    id: extract_event_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.get_events_data.return }}
      column_name: time
      output_type: date
      output_column_name: date

  - name: Persist events data
    id: persist_events_data
    task: persist_df
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: geoparquet
      df: ${{ workflow.get_events_data.return }}
      filename: events_data

  - name: Add temporal index on events
    id: events_wtemporal
    task: add_temporal_index
    partial:
      df: ${{ workflow.extract_event_date.return }}
      time_col: date
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true

  - name: Exclude specific events types from total events
    id: filter_event_type_values
    task: filter_by_value
    partial:  
      df: ${{ workflow.events_wtemporal.return }}
      column_name: event_type 
      value:
        - all_posts
        - lion_sighting_rep
        - buffalo_sighting_rep 
        - elephant_sighting_rep 
        - cheetah_sighting_rep 
        - hwc_rep
        - livestock_predation_rep
        - leopardsightingrep
        - injured_animal_rep
        - wildlife_treatment_rep
        - activity_rep
        - night_and_special_operation 
        - wildlife_carcass_rep 

  # Calculate total events recorded, persist as csv and draw line chart
  - name: Calculate Total Events
    id: total_events_recorded
    task: summarize_df
    partial:
      groupby_cols:
        - date
      summary_params:
        - display_name: no_of_events
          aggregator: nunique
          column: id
      reset_index: true
      df: ${{ workflow.filter_event_type_values.return }}
  
  - name: Add total row on total events recorded
    id: add_total_events_row
    task: add_totals_row
    partial:
      label_col:
        - date 
      label: Total
      df: ${{ workflow.total_events_recorded.return }}

  - name: Persist total events df 
    id: persist_tevents_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.add_total_events_row.return }}
      filename: total_events_recorded

  - name: Draw total events line chart 
    id: draw_events_chart 
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.total_events_recorded.return }}
      x_column: date 
      y_column: no_of_events
      category_column: null
      line_kwargs:
        shape: "linear"
        color: "lightsteelblue"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: false
        fontsize: 16
