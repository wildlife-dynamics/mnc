  # Foot patrol metrics and persist
  - name: Summarize foot patrol metrics
    id: foot_patrol_metrics
    task: summarize_df
    partial:
      groupby_cols:
        - patrol_cat_types
      summary_params:
        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
        - display_name: distance_km
          aggregator: sum
          column: dist_meters
          original_unit: m
          new_unit: km
        - display_name: duration_hrs
          aggregator: sum
          column: timespan_seconds
          original_unit: s
          new_unit: h
      reset_index: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_foot_traj_group.return }}

  - name: Persist foot patrol metrics
    id: persist_foot_df
    task: persist_df
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: df 
      argvalues: ${{ workflow.foot_patrol_metrics.return }}

  # Draw foot patrol maps , persist and create widgets for dashboard 
  - name: Apply Colormap to foot patrols
    id: apply_footp_colormap
    task: apply_color_map
    partial:
      input_column_name: patrol_type_value
      output_column_name: colors
      colormap: coolwarm
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_foot_traj_group.return }}

  - name: Generate  foot patrol layers
    id: generate_foot_layers
    task: create_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_color: colors
        get_width: 1.85
        width_scale: 1
        width_min_pixels: 2
        width_max_pixels: 6
        width_units: pixels
        cap_rounded: true
        joint_rounded: true 
        billboard: false 
        opacity: 0.45
        stroked: true
      legend:
        label_column: patrol_type_value
        color_column: colors
        sort: ascending

    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.apply_footp_colormap.return }}

  - name: Zoom foot patrol trajectories and view state
    id: zoom_foot_patrols
    task: view_state_deck_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.apply_footp_colormap.return }}

  - name: Combine custom loaded map layers and foot patrol layers 
