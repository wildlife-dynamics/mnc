id: mara_north_event_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.14.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.14.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "*"
    channel: file:///tmp/ecoscope-workflows-custom/release/artifacts/

workflow:
  # set workflow details
  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details

  # set time range
  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S %Z"
  
  # define groupers
  - name: Set Groupers
    id: groupers
    task: set_groupers
    partial:
      groupers: []

  # connect to ER 
  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  # define base map layers
  - name: Configure Base Map Layers
    id: configure_base_maps
    task: set_base_maps_aliased

  # Download mnc template and persist
  - name: Download MNC template and persist
    id: persist_mnc_tpt
    task: download_file_and_persist
    partial:
      url: https://www.dropbox.com/scl/fi/wkzd2lm1t5rzidie9wl2j/mara_north_conservancy_report_template_v4.docx?rlkey=os9ffgdk737dc60n568jfrct2&st=zo3i4ovj&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false

  # Download mnc conservancies gpkg file and persist
  - name: Download MNC shapefile
    id: persist_mnc_gpkg
    task: download_file_and_persist
    partial:
      url: https://www.dropbox.com/scl/fi/ahgr1bjv72tdeuiwf3e4h/community-conservancy.gpkg?rlkey=1bla1c9to4nj4y39nnpwpjgsx&st=hj4k3zd7&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
  
  #Load custom shapefiles
  - name : Load local map files
    id: load_local_shapefiles 
    task: load_geospatial_files
    partial:
      config: 
        path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}

  # Create community conservancy map layers 
  - name: Create Map Layers
    id: create_custom_map_layers
    task: create_map_layers
    partial:
      file_dict: ${{ workflow.load_local_shapefiles.return }}
      styles_config:
        styles:
          community_conservancy: 
            stroked: true
            filled: false
            opacity: 0.95
            get_line_color: [105, 105, 105, 200]
            get_line_width: 2.25
        legend:
          label:
            - Conservancy boundaries
          color:
            - "#696969"

  # Clean file key ,select key of interest and create text layer
  - name: Clean file keys from initially loaded geospatial files
    id: clean_local_geo_files
    task: clean_file_keys 
    partial: 
      file_dict: ${{ workflow.load_local_shapefiles.return }}

  - name: Select Key of Interest to annotate text layers on the map
    id: filter_aoi
    task: select_koi
    partial:
      file_dict: ${{ workflow.clean_local_geo_files.return }}
      key_value: community_conservancy
  
  - name: Create text layer 
    id: custom_text_layer
    task: make_text_layer
    partial:
      txt_gdf: ${{ workflow.filter_aoi.return }}
      label_column: label
      fallback_columns:
        - name
      use_centroid: true 
      color: [0,0,0,255]
      size: 64
      font_family: Arial
      font_weight: normal
      background: false
      background_color: null
      background_padding: null
      text_anchor: middle
      alignment_baseline: center
      billboard: true
      pickable: true
      tooltip_columns:
        - label 
      target_crs: epsg:4326

  # 1. Weather report 
  # Retrieve observations from ER
  - name: Get subject observations from ER 
    id: subject_observations
    task: get_subjectgroup_observations
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      raise_on_empty: false
      include_details: false
      include_subjectsource_details: false
  
  # Extract precipitation data
  - name: Extract Precipitation Data
    id: extract_precipitation
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.subject_observations.return }}
      column_name: extra__observation_details
      field_name_options:
        - precipitation
      output_type: float
      output_column_name: precipitation
  
  # Extract temperature data
  - name: Extract Temperature Data
    id: extract_temperature
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_precipitation.return }}
      column_name: extra__observation_details
      field_name_options:
        - surface_air_temperature
      output_type: float
      output_column_name: temperature
  
  # Extract date
  - name: Extract Date
    id: extract_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.extract_temperature.return }}
      column_name: fixtime
      output_type: date
      output_column_name: date
  
  # Rename column
  - name: Rename value grouper columns
    id: rename_grouper_columns
    task: map_columns
    partial:
      df: ${{ workflow.extract_date.return }}
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__subject__name: "weather_station"

  - name: Add temporal index
    id: df_with_temporal_index
    task: add_temporal_index
    partial:
      df: ${{ workflow.rename_grouper_columns.return }}
      time_col: fixtime
      groupers: ${{ workflow.groupers.return }}

  - name: Split by Group
    id: split_weather_groups
    task: split_groups
    partial:
      df: ${{ workflow.df_with_temporal_index.return }}
      groupers: ${{ workflow.groupers.return }}
  
  - name: Calculate Daily Summary
    id: daily_weather
    task: summarize_df
    partial:
      groupby_cols:
        - weather_station
        - date
      summary_params:
        - display_name: daily_precipitation
          aggregator: sum
          column: precipitation
        - display_name: daily_temperature
          aggregator: mean
          column: temperature
      reset_index: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_weather_groups.return }}

  # Draw precipitation chart , persist and add widgets
  - name: Draw Precipitation Chart
    id: precipitation_chart
    task: draw_line_chart
    partial:
      x_column: date
      y_column: daily_precipitation
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: "Precipitation by Station"
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          showgrid: true
          gridcolor: "#e0e0e0"
          gridwidth: 1
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Precipitation (mm)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"
    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.daily_weather.return }}

  - name: Persist Precipitation Chart as Text
    id: persist_precipitation
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.precipitation_chart.return }}

  - name: Create Precipitation Widget
    id: precipitation_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Daily Precipitation by Station"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_precipitation.return }}

  - name: Merge Precipitation Widget Views
    id: grouped_precipitation_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.precipitation_chart_widget.return }}

  # Draw temperature chart, persist and add widgets
  - name: Draw Temperature Chart
    id: temperature_chart
    task: draw_line_chart
    partial:
      x_column: date
      y_column: daily_temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: "Temperature by Station"
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"
    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.daily_weather.return }}

  - name: Persist Temperature Chart as Text
    id: persist_temperature
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.temperature_chart.return }}
      
  - name: Create Temperature Widget
    id: temperature_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Daily Temperature by Station"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_temperature.return }}

  - name: Merge Temperature Widget Views
    id: grouped_temperature_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.temperature_chart_widget.return }}

  # 2. Patrol Efforts
  # Get all events 
  - name: Get events
    id: get_events_data
    task: get_events
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
      event_types: []
      raise_on_empty: false
      include_details: true
      include_updates: false
      include_related_events: false
  
    # Extract date
  - name: Extract Date
    id: extract_event_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.get_events_data.return }}
      column_name: created_at
      output_type: date
      output_column_name: date

  - name: Add temporal index on events
    id: events_wtemporal
    task: add_temporal_index
    partial:
      df: ${{ workflow.extract_event_date.return }}
      time_col: created_at
      groupers: ${{ workflow.groupers.return }}

  - name: Split events by group
    id: split_event_groups
    task: split_groups
    partial:
      df: ${{ workflow.events_wtemporal.return }}
      groupers: ${{ workflow.groupers.return }}

    # Calculate total events recorded, persist as csv and draw line chart
  - name: Calculate Total Events
    id: total_events_recorded
    task: summarize_df
    partial:
      groupby_cols:
        - date
      summary_params:
        - display_name: no_of_events
          aggregator: nunique
          column: id
      reset_index: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_event_groups.return }}
  
  - name: Add total row on total events recorded
    id: add_total_events_row
    task: add_totals_row
    partial:
      label_col:
        - date 
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.total_events_recorded.return }}

  - name: Persist total events df 
    id: persist_tevents_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.add_total_events_row.return }}

  - name: Draw total events line chart 
    id: draw_events_chart 
    task: draw_line_chart
    partial:
      x_column: date 
      y_column: no_of_events

      line_kwargs:
        shape: "linear"
        color: "cornflowerblue"
      layout_kwargs:
        title: "Total events recorded"
        title_x: 0.01
        title_y:  0.95
        showlegend: false
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "No of events"
          tickformat: ".1f"
        hovermode: "x unified"

    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.total_events_recorded.return }}
    
  - name: Persist Total events chart as Text
    id: persist_total_events
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.draw_events_chart.return }}

  - name: Create Total Events Widget
    id: tevents_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Total Events"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_total_events.return }}

  - name: Merge total events Widget Views
    id: grouped_tevents_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.tevents_chart_widget.return }}

 # --- Patrol Information ---
  - name: Filter events and get patrol information records 
    id: filter_patrol_info_events
    task: filter_by_value
    partial:
      column_name: event_type	
      value: patrol_information
    mapvalues: 
      argnames: df
      argvalues: ${{ workflow.split_event_groups.return }}
  
  - name: Normalize event details columns 
    id: normalize_pi_values
    task: normalize_column
    partial:
      column: event_details
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.filter_patrol_info_events.return }}

  # Generate patrol information summary and  persist as csv
  - name: Patrol information Summary
    id: patrol_info_summary
    task: summarize_df
    partial:
      groupby_cols:
        - event_details__patrol_purpose
      summary_params:
        - display_name: Number of Patrols
          aggregator: count 
          column: id 
      reset_index: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.normalize_pi_values.return }}
  
  - name: Add totals row in patrol info summary table
    id: include_pat_totals
    task: add_totals_row
    partial:
      label_col: 
        - event_details__patrol_purpose
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.patrol_info_summary.return }}

  - name: Persist patrol summary table 
    id: persist_patrol_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.include_pat_totals.return }}

# --- Patrol Observations --- 
  - name: Get combined patrol and events params 
    id: get_patrol_events_params 
    task: get_patrols_from_combined_params
    partial:
      combined_params:
        client: ${{ workflow.er_client_name.return }}
        time_range: ${{ workflow.time_range.return }}
        event_types:
          - '5c35b260-4711-49cb-a863-ad2b43317b29'
        patrol_types:
          - mnc_motorbike_patrol_nkorbob
          - mnc_foot_patrol_naishi
          - mnc_motorbike_patrol_enkikwei
          - mnc_vehicle_patrol_nkorbob
          - mnc_vehicle_patrol_rekero
          - mnc_motorbike_patrol_naishi
          - mnc_vehicle_patrol_naishi
          - mnc_Vehicle_patrol_ndoto
          - mnc_foot_patrol_mara_east
          - mnc_motorbike_patrol_yiale
          - mnc_motorbike_patrol_ndoto
          - mnc_motorbike_patrol_hqteam
          - mnc_vehicle_patrol_aitong
          - mnc_foot_patrol_kicheche
          - mnc_vehicle_patrol_hqteam
          - mnc_motorbike_patrol_kicheche
          - mnc_vehicle_patrol_enkuyanai
          - mnc_foot_patrol_rekero
          - mnc_foot_patrol_hqteam
          - mnc_vehicle_patrol_kicheche
          - mnc_foot_patrol  cheli team
          - mnc_foot_patrol_aitong
          - mnc_foot_patrol_enkikwei team
          - mnc_vehicle_patrol_enkikwei team
          - mnc_foot_patrol_enkuyanai
          - mnc_vehicle_patrol_mara_east
          - mnc_motorbike_patrol_rekero
          - mnc_foot_patrol_ndoto
          - mnc_motorbike_patrol_aitong
          - mnc_foot_patrol_nkorbob
          - mnc_motorbike_patrol_Airstrip
          - Motorcycle Patrol
          - Foot Patrol
          - mnc_vehicle_patrol_cheli
          - mnc_foot_patrol_musiara team
          - mnc_motorbike_patrol_musiara team
          - mnc_motorbike_patrol_cheli
          - mnc_vehicle_patrol_musiara
          - mnc_foot_patrol_Karen
          - mnc_Vehicle_patrol_Karen
          - mnc_motorbike_patrol_Karen
          - mnc_motorbike_patrol_enkuyanai
          - mnc_motorbike_grazing_zone1
          - mnc_motorbike_grazing_zone4

  - name: Use combined patrol df to generate relevant patrols
    id: patrol_observations
    task: get_patrol_observations_from_patrols_df_and_combined_params
    partial:
      patrols_df: ${{ workflow.get_patrol_events_params.return }}
      combined_params:
        client: ${{ workflow.er_client_name.return }}
        time_range: ${{ workflow.time_range.return }}
        event_types:
          - '5c35b260-4711-49cb-a863-ad2b43317b29'
        patrol_types:
          - mnc_motorbike_patrol_nkorbob
          - mnc_foot_patrol_naishi
          - mnc_motorbike_patrol_enkikwei
          - mnc_vehicle_patrol_nkorbob
          - mnc_vehicle_patrol_rekero
          - mnc_motorbike_patrol_naishi
          - mnc_vehicle_patrol_naishi
          - mnc_Vehicle_patrol_ndoto
          - mnc_foot_patrol_mara_east
          - mnc_motorbike_patrol_yiale
          - mnc_motorbike_patrol_ndoto
          - mnc_motorbike_patrol_hqteam
          - mnc_vehicle_patrol_aitong
          - mnc_foot_patrol_kicheche
          - mnc_vehicle_patrol_hqteam
          - mnc_motorbike_patrol_kicheche
          - mnc_vehicle_patrol_enkuyanai
          - mnc_foot_patrol_rekero
          - mnc_foot_patrol_hqteam
          - mnc_vehicle_patrol_kicheche
          - mnc_foot_patrol  cheli team
          - mnc_foot_patrol_aitong
          - mnc_foot_patrol_enkikwei team
          - mnc_vehicle_patrol_enkikwei team
          - mnc_foot_patrol_enkuyanai
          - mnc_vehicle_patrol_mara_east
          - mnc_motorbike_patrol_rekero
          - mnc_foot_patrol_ndoto
          - mnc_motorbike_patrol_aitong
          - mnc_foot_patrol_nkorbob
          - mnc_motorbike_patrol_Airstrip
          - Motorcycle Patrol
          - Foot Patrol
          - mnc_vehicle_patrol_cheli
          - mnc_foot_patrol_musiara team
          - mnc_motorbike_patrol_musiara team
          - mnc_motorbike_patrol_cheli
          - mnc_vehicle_patrol_musiara
          - mnc_foot_patrol_Karen
          - mnc_Vehicle_patrol_Karen
          - mnc_motorbike_patrol_Karen
          - mnc_motorbike_patrol_enkuyanai
          - mnc_motorbike_grazing_zone1
          - mnc_motorbike_grazing_zone4

  - name: Classify patrol types
    id: map_patrol_types
    task: classify_mnc_patrol
    partial:
      df: ${{ workflow.patrol_observations.return }}
      patrol_col: patrol_type__value
      new_col: patrol_cat_types

  # split observations based on foot , vehicle and motorcycle 
  - name: Filter foot patrol observations 
    id: filter_foot_patrols
    task: filter_by_value
    partial:
      column_name: patrol_cat_types
      value:  Foot
      df:  ${{ workflow.map_patrol_types.return }}

  - name: Filter vehicle patrol observations 
    id: filter_vehicle_patrols
    task: filter_by_value
    partial:
      column_name: patrol_cat_types
      value:  Vehicle
      df:  ${{ workflow.map_patrol_types.return }}

  - name: Filter motorbike patrol observations 
    id: filter_motor_patrols
    task: filter_by_value
    partial:
      column_name: patrol_cat_types
      value: Motorcycle
      df:  ${{ workflow.map_patrol_types.return }}

  - name: Transform foot observations to relocs
    id: foot_patrols
    task: process_relocations
    partial:
      observations: ${{ workflow.filter_foot_patrols.return }}
      relocs_columns:
        - extra__id
        - extra__created_at
        - extra__subject_id
        - geometry
        - groupby_col
        - fixtime
        - junk_status
        - patrol_id
        - patrol_title
        - patrol_serial_number
        - patrol_start_time
        - patrol_end_time
        - patrol_type
        - patrol_status
        - patrol_subject
        - patrol_type__value
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Transform vehicle observations to relocs
    id: vehicle_patrols
    task: process_relocations
    partial:
      observations: ${{ workflow.filter_vehicle_patrols.return }}
      relocs_columns:
        - extra__id
        - extra__created_at
        - extra__subject_id
        - geometry
        - groupby_col
        - fixtime
        - junk_status
        - patrol_id
        - patrol_title
        - patrol_serial_number
        - patrol_start_time
        - patrol_end_time
        - patrol_type
        - patrol_status
        - patrol_subject
        - patrol_type__value
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Transform motorbike observations to relocs
    id: motorbike_patrols
    task: process_relocations
    partial:
      observations: ${{ workflow.filter_motor_patrols.return }}
      relocs_columns:
        - extra__id
        - extra__created_at
        - extra__subject_id
        - geometry
        - groupby_col
        - fixtime
        - junk_status
        - patrol_id
        - patrol_title
        - patrol_serial_number
        - patrol_start_time
        - patrol_end_time
        - patrol_type
        - patrol_status
        - patrol_subject
        - patrol_type__value
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Convert foot relocations to trajectories
    id: foot_trajs
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.foot_patrols.return }}

  - name: Convert vehicle relocations to trajectories
    id: vehicle_trajs
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.vehicle_patrols.return }}
      
  - name: Convert motorbike relocations to trajectories
    id: motor_trajs
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.motorbike_patrols.return }}

  - name: Add temporal index to foot trajs
    id: temporal_foot_traj
    task: add_temporal_index
    partial:
      df: ${{ workflow.foot_trajs.return }}
      time_col: segment_start
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  - name: Add temporal index to vehicle trajs
    id: temporal_vehicle_traj
    task: add_temporal_index
    partial:
      df: ${{ workflow.vehicle_trajs.return }}
      time_col: segment_start
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  - name: Add temporal index to motorbike trajs
    id: temporal_motor_traj
    task: add_temporal_index
    partial:
      df: ${{ workflow.motor_trajs.return }}
      time_col: segment_start
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  - name: Rename foot traj columns
    id: rename_foot_trajs
    task: map_columns
    partial:
      drop_columns:
        - heading
        - extra__created_at
        - extra__id 
      retain_columns: []
      rename_columns:
