  #     html_path: ${{ workflow.persist_vehicle_patrol_urls.return }}

 # Motorbike patrol metrics and persist
  - name: Summarize motorbike patrol metrics
    id: motor_patrol_metrics
    task: summarize_df
    partial:
      groupby_cols:
        - patrol_type_value
      summary_params:
        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
        - display_name: distance_km
          aggregator: sum
          column: dist_meters
          original_unit: m
          new_unit: km
        - display_name: duration_hrs
          aggregator: sum
          column: timespan_seconds
          original_unit: s
          new_unit: h
      reset_index: true
      df: ${{ workflow.split_motor_traj_group.return }}

  - name: Persist motorbike patrol metrics
    id: persist_motor_df
    task: persist_df
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.motor_patrol_metrics.return }}
      filename: motorbike_patrol_efforts


  # Draw motor patrol maps , persist and convert map to png  
  - name: Apply Colormap to motor patrols
    id: apply_motor_colormap
    task: apply_color_map
    partial:
      input_column_name: patrol_type_value
      output_column_name: colors
      colormap: plasma
      df: ${{ workflow.split_motor_traj_group.return }}

  - name: Generate motor patrol layers
    id: generate_motor_layers
    task: create_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_color: colors
        get_width: 1.85
        width_scale: 1
        width_min_pixels: 2
        width_max_pixels: 6
        width_units: pixels
        cap_rounded: true
        joint_rounded: true 
        billboard: false 
        opacity: 0.45
        stroked: true
      legend:
        label_column: patrol_type_value
        color_column: colors
        sort: ascending
      geodataframe: ${{ workflow.apply_motor_colormap.return }}

  - name: Zoom motor patrol trajectories and view state
    id: zoom_motor_patrols
    task: view_state_deck_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.conservancy_gdf.return }}

  - name: Combine custom loaded map layers and motor patrol layers 
    id: combine_custom_motor_patrols
    task: merge_static_and_grouped_layers
    partial:
      static_layers: 
        - ${{ workflow.create_mnc_styled_layers.return }}
        - ${{ workflow.custom_text_layer.return }}
      grouped_layers: ${{ workflow.generate_motor_layers.return }}

  - name: Draw motor patrol pydeck map 
    id: draw_motor_patrol_map
    task: draw_custom_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
        title: "Motorbike patrol types"
      geo_layers: ${{ workflow.combine_custom_motor_patrols.return }}
      view_state: ${{ workflow.zoom_motor_patrols.return }}
    
  - name: Persist motor patrols map HTML paths
    id: persist_motor_patrol_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_motor_patrol_map.return }}
      filename: motorbike_patrols_map.html

  # - name: Convert motorbike patrol map to png 
  #   id: convert_motor_png 
  #   task: html_to_png
  #   partial:
  #     output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
  #     config:
  #       wait_for_timeout: 20000
  #     html_path: ${{ workflow.persist_motor_patrol_urls.return }}
  
  # Merging all the trajectories ie foot , vehicle and motorbike
  - name: Merge motorbike ,vehicle and foot patrol trajectories 
    id: merge_trajs 
    task: merge_multiple_df
    partial:
      list_df:
        - ${{ workflow.foot_trajs.return }}
        - ${{ workflow.vehicle_trajs.return }}
        - ${{ workflow.motor_trajs.return }}

      ignore_index: true
      sort: false

  - name: Split merged trajectories by group
    id: split_merged_trajs
    task: split_groups
    partial:
      df: ${{ workflow.merge_trajs.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Summarize overall ranger patrol metrics
    id: ranger_patrol_metrics
    task: summarize_df
    partial:
      groupby_cols:
        - patrol_subject_name
      summary_params:
        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
        - display_name: distance_km
          aggregator: sum
          column: dist_meters
          original_unit: m
          new_unit: km
        - display_name: duration_hrs
          aggregator: sum
          column: timespan_seconds
          original_unit: s
          new_unit: h
      reset_index: true
      df: ${{ workflow.split_merged_trajs.return }}

  - name: Persist total patrol coverage 
    id: persist_total_df
    task: persist_df
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.ranger_patrol_metrics.return }}
      filename: overall_patrol_efforts

  - name: Compute patrol visits 
    id: patrol_grid_visits
    task: create_patrol_coverage_grid
    partial:
      grid_cell_size: 1000
      trajs: ${{ workflow.split_merged_trajs.return }}

  - name: Apply bin classification on grids
    id: apply_classification_grid
    task: apply_classification
    partial:
      input_column_name: unique_patrol_count
      output_column_name: density_bins 
      label_options:
        label_ranges: false
        label_decimals: 1
      classification_options:
        k: 5
        scheme: "equal_interval"
      df: ${{ workflow.patrol_grid_visits.return }}

  - name: Apply Colormap to patrol grid visits
    id: apply_grid_colormap
    task: apply_color_map
    partial:
      input_column_name: density_bins
      colormap: RdYlGn
      output_column_name: density_colors
      df: ${{ workflow.apply_classification_grid.return }}

  - name: Create patrol visit grid layers
    id: generate_grid_layers
    task: create_polygon_layer_pydeck
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style: 
        get_fill_color: density_colors
        opacity: 0.25
        get_line_width: 1
        stroked: true

      legend:
        label_column: density_bins
        color_column: density_colors
      tooltip_columns:
        - density_bins
        - density_colors
      geodataframe: ${{ workflow.apply_grid_colormap.return }}

  - name: Zoom grid polygons by view state
    id: zoom_grid_view
    task: view_state_deck_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.conservancy_gdf.return }}

  - name: Combine custom loaded map layers and patrol grid layer 
    id: combine_patrol_grid
    task: merge_static_and_grouped_layers
    partial:
      static_layers: 
        - ${{ workflow.create_mnc_styled_layers.return }}
        - ${{ workflow.custom_text_layer.return }}
      grouped_layers: ${{ workflow.generate_grid_layers.return }}
      
  - name: Draw grid ecomaps
    id: draw_grid_map
    task: draw_custom_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
        title: "Grid visits"
      geo_layers:  ${{ workflow.combine_patrol_grid.return }}
      view_state: ${{ workflow.zoom_grid_view.return }}

  - name: Persist grid map html paths
    id: persist_grid_map_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_grid_map.return }}
      filename: patrol_coverage_map.html 
  
  # - name: Convert patrol grid map to png 
  #   id: convert_patrol_grid_png 
  #   task: html_to_png
  #   partial:
  #     output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
  #     config:
  #       wait_for_timeout: 20000
  #     html_path: ${{ workflow.persist_grid_map_urls.return }}

  - name: Compute patrol occupancy
    id: compute_patrol_occupancy
    task: compute_occupancy 
    partial:  
      coverage_grid_gdf: ${{ workflow.patrol_grid_visits.return }}
      regions_gdf: ${{ workflow.conservancy_gdf.return }}
      crs: epsg:4326
  
  - name: round off values to two decimal places
    id: round_off_patrol
    task: round_values
    partial:  
      df: ${{ workflow.compute_patrol_occupancy.return }}
      column: occupancy_percentage 
      decimals: 2
  
  - name: persist occupancy df 
    id: persist_occupancy_df
    task: persist_df
    partial: 
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.round_off_patrol.return }}
      filename: patrol_coverage

  # 3. Livestock Summary 
  - name: Filter events to get mobile boma rep 
    id: filter_mobile_boma 
    task: filter_df
    partial: 
      column_name: event_type	
      op: equal
      value: mobile_boma_rep
      df: ${{ workflow.exclude_event_type_values.return }}

  - name: Normalize event details columns 
    id: normalize_mb_values
    task: normalize_column
    partial:
      column: event_details
      df: ${{ workflow.filter_mobile_boma.return }}

  - name: Rename mobile boma columns 
    id: rename_mobile_boma
    task: map_columns
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        event_details__mobile_boma : boma 
      df: ${{ workflow.normalize_mb_values.return }}

  - name: Mobile boma summary table
    id: mobile_boma_summary
    task: summarize_df
    partial:
      groupby_cols:
        - boma
      summary_params:
        - display_name: total_count
          aggregator: count 
          column: id 
      reset_index: true
      df: ${{ workflow.rename_mobile_boma.return }}

  - name: Add totals row in mobile boma summary table
    id: include_mb_totals
    task: add_totals_row
    partial:
      label_col: 
        - boma
      label: Total
      df: ${{ workflow.mobile_boma_summary.return }}

  - name: Persist mobile boma summary table 
    id: persist_mobile_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      filename: mobile_boma_summary
      df: ${{ workflow.include_mb_totals.return }}

  - name: Apply Colormap to mobile boma events
    id: apply_mb_colormap
    task: apply_color_map
    partial:
      input_column_name: event_type
      output_column_name: event_type_colors
      colormap: plasma
      df: ${{ workflow.rename_mobile_boma.return }}

  - name: Generate mobile boma point layers
    id: generate_mb_layers
    task: create_scatterplot_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: event_type_colors
        get_radius: 4
        opacity: 0.55
        stroked: true
      legend:
        label_column: event_type
        color_column: event_type_colors
        sort: ascending
      geodataframe: ${{ workflow.apply_mb_colormap.return }}

  - name: Zoom mobile boma point layers  and view state
    id: zoom_mobile_boma
    task: view_state_deck_gdf
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.conservancy_gdf.return }}

  - name: Combine custom loaded map layers and mobile boma point layers
    id: combine_custom_mobile_boma
    task: merge_static_and_grouped_layers
    partial:
      static_layers: 
        - ${{ workflow.create_mnc_styled_layers.return }}
        - ${{ workflow.custom_text_layer.return }}

      grouped_layers: ${{ workflow.generate_mb_layers.return }}

  - name: Draw mobile boma pydeck map 
    id: draw_mb_map
    task: draw_custom_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
        title: "Mobile Boma"
      geo_layers: ${{ workflow.combine_custom_mobile_boma.return }}
      view_state: ${{ workflow.zoom_mobile_boma.return }} 

  - name: Persist mobile boma map HTML paths
    id: persist_mobile_boma_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_mb_map.return }}
      filename: boma_movement_map.html 
  
  # livestock rep
  - name: Filter events to get livestock predation events
    id: filter_predation 
    task: filter_df
    partial: 
      column_name: event_type	
      op: equal
      value: livestock_predation_rep
      df: ${{ workflow.exclude_event_type_values.return }}

  - name: Normalize event details columns 
    id: normalize_predation_values
    task: normalize_column
    partial:
      column: event_details
      df: ${{ workflow.filter_predation.return }}

  - name: Rename livestock predation columns 
    id: rename_livestock_predation
    task: map_columns
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        event_details__livestockpredation_comments: livestock_predation_comments
        event_details__livestockpredation_datetime: predation_datetime
        event_details__livestockpredation_location: predation_location
        event_details__livestockpredation_causedeath: predation_cause_of_death
        event_details__livestockpredation_retaliation: predation_retaliation
        event_details__livestockpredation_supervision: predation_supervision
        event_details__livestockpredation_predatorcount: predator_count
        event_details__livestockpredation_killedjuvenile:  killed_juvenile
        event_details__livestockpredation_livestockowner: livestock_owner
        event_details__livestockpredation_distancetopeople: distance_to_people
        event_details__livestockpredation_livestockspecies: livestock_species
        event_details__livestockpredation_woundedsurvivors: wounded_survivors
        event_details__livestockpredation_livestockaffected: livestock_affected
        event_details__livestockpredation_suspectedpredator: suspected_predator
        event_details__livestockpredation_bomacontext: boma_context
        event_details__livestockpredation_killedadultmale: killed_adult_male
        event_details__livestockpredation_bomaconstruction:  boma_construction
        event_details__livestockpredation_killedadultfemale: killed_adult_female
        event_details__livestockpredation_woundedjuvenile: wounded_juvenile
        event_details__livestockpredation_woundedadultfemale: wounded_adult_female
        event_details__livestockpredation_woundedadultmale: wounded_adult_male
        event_details__livestockpredation_bomaheight: boma_height
        event_details__livestockpredation_bomavisibility: boma_visibility

      df: ${{ workflow.normalize_mb_values.return }}

  - name: Replace suspected predator nulls with unknown 
    id: replace_predator_nulls
    task: replace_missing_with_label
    partial:
      df: ${{ workflow.rename_livestock_predation.return }}
      column_name: suspected_predator
      label: unknown 
  
  - name: Replace livestock species null with unknown 
    id: replace_species_null
    task: replace_missing_with_label
    partial:
      df: ${{ workflow.replace_predator_nulls.return }}
      column: livestock_species
      label: unknown
  
  - name: Convert livestock affected to int 
    id: convert_livestock_int
    task: convert_to_int
    partial: 
      df: ${{ workflow.replace_species_null.return }}
      columns: 
        - livestock_affected
      errors: coerce
      fill_value: 0
      inplace: false

  - name: Livestock predation summary table
    id: livestock_predation_summary
    task: summarize_df
    partial:
      groupby_cols:
        - date
        - suspected_predator
        - livestock_species
      summary_params:
        - display_name: no_affected
          aggregator: sum 
          column: livestock_affected
      reset_index: true
      df: ${{ workflow.convert_livestock_int.return }}

  - name: Persist livestock predation summary table
    id: persist_livestock_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      filename: livestock_predation_events
      df: ${{ workflow.include_mb_totals.return }}

  - name: Calculate livestock events recorded 
    id: livestock_events_recorded
    task: summarize_df
    partial:
      groupby_cols:
        - date
      summary_params:
        - display_name: no_of_events
          aggregator: nunique
          column: id
      reset_index: true
      df: ${{ workflow.convert_livestock_int.return }}
  
  - name: Add total row on livestock events recorded
    id: add_total_livestock
    task: add_totals_row
    partial:
      label_col:
        - date 
      label: Total
      df: ${{ workflow.livestock_events_recorded.return }}

  - name: Persist livestock events df 
    id: livestock_events_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.add_total_livestock.return }}
      filename: livestock_events_recorded


  - name: Exclude geom outliers 
    id: exclude_livestock_outliers
    task: exclude_geom_outliers
    partial: 
      df: ${{ workflow.convert_livestock_int.return }}
      z_threshold: 3
  
  - name: Remove invalid point geometries
    id: remove_invalid_geoms
    task: remove_invalid_point_geometries
    partial:  
      gdf: ${{ workflow.exclude_livestock_outliers.return }}
  
  - name: Apply Colormap to livestock predation events
    id: apply_livestock_colormap
    task: apply_color_map
    partial:
      input_column_name: livestock_species
      output_column_name: colors
      colormap: Reds_r
      df: ${{ workflow.remove_invalid_geoms.return }}

  - name: Generate livestock predation point layers
    id: generate_livestock_layers
    task: create_scatterplot_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: colors
        get_radius: 4
        opacity: 0.55
        stroked: true
      legend:
        label_column: livestock_species
        color_column: colors
        sort: ascending
      geodataframe: ${{ workflow.apply_mb_colormap.return }}

  - name: Zoom livestock predation point layers  and view state
    id: zoom_livestock_events
    task: view_state_deck_gdf
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.conservancy_gdf.return }}

  - name: Combine custom loaded map layers and livestock predation point layers
    id: combine_custom_livestock
    task: merge_static_and_grouped_layers
    partial:
      static_layers: 
        - ${{ workflow.create_mnc_styled_layers.return }}
        - ${{ workflow.custom_text_layer.return }}

      grouped_layers: ${{ workflow.generate_livestock_layers.return }}

  - name: Draw livestock predation pydeck map 
    id: draw_livestock_map
    task: draw_custom_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
        title: "Livestock affected"
      geo_layers: ${{ workflow.combine_custom_livestock.return }}
      view_state: ${{ workflow.zoom_livestock_events.return }} 

  - name: Persist livestock predation map HTML paths
    id: persist_livestock_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_mb_map.return }}
      filename: livestock_predation_events.html 

  - name: MNC event report dashboard
    id: mnc_events_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets: []
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}