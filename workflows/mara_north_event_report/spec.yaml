        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
        - display_name: distance_km
          aggregator: sum
          column: dist_meters
          original_unit: m
          new_unit: km
        - display_name: duration_hrs
          aggregator: sum
          column: timespan_seconds
          original_unit: s
          new_unit: h
        - display_name: average_speed 
          aggregator: mean 
          column: speed_kmhr
      reset_index: true
      df: ${{ workflow.rename_motor_trajs.return }}

  - name: Add totals row to motorbike patrols
    id: add_mb_metrics_totals
    task: add_totals_row
    partial: 
      label_col: 
        - patrol_type_value
      label: Total 
      df: ${{ workflow.motor_patrol_metrics.return }}

  - name: Persist motorbike patrol metrics
    id: persist_motor_df
    task: persist_df
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.add_mb_metrics_totals.return }}
      filename: motorbike_patrol_efforts

  # Draw motor patrol maps , persist and convert map to png  
  - name: Apply Colormap to motor patrols
    id: apply_motor_colormap
    task: apply_color_map
    partial:
      input_column_name: patrol_type_value
      output_column_name: colors
      colormap: tab20
      df: ${{ workflow.rename_motor_trajs.return }}

  - name: Generate motor patrol layers
    id: generate_motor_layers
    task: create_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_color: colors
        get_width: 1.85
        width_scale: 1
        width_min_pixels: 2
        width_max_pixels: 6
        width_units: pixels
        cap_rounded: true
        joint_rounded: true 
        billboard: false 
        opacity: 0.45
        stroked: true
      legend:
        label_column: patrol_type_value
        color_column: colors
        sort: ascending
      geodataframe: ${{ workflow.apply_motor_colormap.return }}

  - name: Zoom motor patrol trajectories and view state
    id: zoom_motor_patrols
