      summary_params:
        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
          decimal_places: 0 
        - display_name: distance_km
          aggregator: sum
          column: dist_meters
          original_unit: m
          new_unit: km
          decimal_places: 2
        - display_name: duration_hrs
          aggregator: sum
          column: timespan_seconds
          original_unit: s
          new_unit: h
          decimal_places: 2
      reset_index: true
