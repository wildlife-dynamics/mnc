        label_column: elephant_sight_herd_composition
        color_column: colors
        sort: ascending
      geodataframe: ${{ workflow.apply_ele_events_colormap.return }}

  - name: Combine custom loaded map layers and elephant point layers
    id: combine_custom_ele
    task: combine_deckgl_map_layers
    partial:
      static_layers: 
        - ${{ workflow.create_conservancy_boundaries.return }}
        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}
        - ${{ workflow.custom_text_layer.return }}

      grouped_layers: ${{ workflow.generate_elephant_layers.return }}

  - name: Draw elephant pydeck map 
    id: draw_elephant_map
    task: draw_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_custom_ele.return }}
      view_state: ${{ workflow.global_zoom_value.return }} 

  - name: Persist elephant events  map HTML paths
    id: persist_elephant_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_elephant_map.return }}
      filename: elephant_sightings_events.html  # -- convert this to png 

  - name: Generate herd composition summary table 
    id: elephant_herd_summary 
    task: summarize_df
    partial: 
      groupby_cols:
        - elephant_sight_herd_composition
      summary_params:
        - display_name: herd_distribution
          aggregator: sum 
          column: elephant_sight_herd_size
      reset_index: true 
      df: ${{ workflow.rename_elephant_cols.return }}
  
  - name: add totals row on elephant herd size summary table 
    id: total_ele_composition
    task: add_totals_row
    partial: 
      label_col:
        - elephant_sight_herd_composition
      label: Total 
      df: ${{ workflow.elephant_herd_summary.return }}
  
  - name: Persist elephant herd size summary table
    id: persist_ele_summary
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv  
      filename: elephant_herd_size_distribution_table
      df: ${{ workflow.total_ele_composition.return }}

  - name: Bin elephant herd size columns 
    id: bin_elephant_herd_col
    task: bin_columns
    partial:
      columns: 
        - elephant_sight_herd_size
      bins: 10
      suffix: bins 
      inplace: false
      df: ${{ workflow.replace_ele_nulls.return }}
  
  - name: Categorize elephant bins column
    id: cat_elephant_bins 
    task: categorize_bins 
    partial:
      df: ${{ workflow.bin_elephant_herd_col.return }}
      col: elephant_sight_herd_sizebins

  - name: Draw elephant herd size bar chart 
    id: draw_elephant_herd_bar
    task: draw_bar_chart 
    partial: 
      dataframe: ${{ workflow.cat_elephant_bins.return }}
      category: elephant_sight_herd_sizebins
      layout_kwargs:
        font_size: 20
        font_color: "#222222"
        plot_bgcolor: "#f5f5f5"
        title_x: 0.5 
        xaxis:
          title: Group size
        yaxis: 
          title: Number of records
        showlegend: false
        bargap: 0.1
      bar_chart_configs: 
        - column: id
          agg_func: count
          label: ""
          style: 
            marker_color: "lightsteelblue"

  - name: Persist elephant bar chart 
    id: persist_elephant_bar
    task: persist_text
    partial: 
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_elephant_herd_bar.return }}
      filename: elephant_herd_size_bar_chart.html  # -- convert to png 

  # draw map by bins 
  - name: Drop null size elephant sight bins 
    id: drop_null_ele_bins 
    task: drop_null_values 
    partial:
      df: ${{ workflow.cat_elephant_bins.return }}
      col: elephant_sight_herd_sizebins

  - name: Exclude geom outliers fom elephant sight bins
    id: exclude_ele_outlier_bins
    task: exclude_geom_outliers
    partial: 
      df: ${{ workflow.drop_null_ele_bins.return }}
      z_threshold: 3

  - name: Remove invalid points from elephant events
    id: drop_ele_bins_invalid_geoms 
    task: ecoscope-workflows-ext-custom.tasks.transformation.drop_null_geometry 
    partial: 
      gdf: ${{ workflow.exclude_ele_outlier_bins.return }}
      geometry_column: geometry 

  - name: Apply elephant bins to plot 
    id: apply_ele_color_bins 
    task: apply_color_map 
    partial:
      input_column_name: elephant_sight_herd_sizebins 
      output_column_name: colors
      colormap: tab20
      df: ${{ workflow.drop_ele_bins_invalid_geoms.return }}

  - name: Generate elephant herd size point layers
    id: generate_ele_herd_layers
    task: create_scatterplot_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: colors
        get_radius: elephant_sight_herd_size
        line_width_min_pixels: 1
        radius_units: pixels
        radius_scale: 0.43 
        opacity: 0.75
        stroked: false
      legend:
        title: Elephant Group Sizes
        label_column: elephant_sight_herd_sizebins
        color_column: colors
        sort: ascending
      geodataframe: ${{ workflow.apply_ele_color_bins.return }}

  - name: Combine styled layers with elephant events 
    id: combine_ele_bins
    task: combine_deckgl_map_layers
    partial:
      static_layers: 
        - ${{ workflow.create_conservancy_boundaries.return }}
        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}
        - ${{ workflow.custom_text_layer.return }}

      grouped_layers: ${{ workflow.generate_ele_herd_layers.return }}

  - name: Draw elephant herd size map
    id: draw_ele_herd_map
    task: draw_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_ele_bins.return }}
      view_state: ${{ workflow.global_zoom_value.return }} 

  - name: Persist elephant herd  map HTML paths
    id: persist_ele_herd_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_ele_herd_map.return }}
      filename: elephant_herd_types_map.html  # -- convert to png 

      # 2.4.2 Buffalo

  - name: MNC event report dashboard
    id: mnc_events_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets: []
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}
      
