        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average wind speed"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind speed chart as text
    id: persist_wind_speed
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_speed_chart.return }}
      filename: wind_speed_readings_over_time.html

  # - name: Convert wind speed html to png
  #   id: wind_speed_png 
  #   task: html_to_png
  #   partial:
  #     output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
  #     config:
  #       wait_for_timeout: 1000
  #     html_path: ${{ workflow.persist_wind_speed.return }}

  # Draw wind gusts  chart, persist and add widgets
  - name: Draw wind gusts chart 
    id: wind_gusts_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_gusts
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Max wind gusts"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind gusts chart as text
    id: persist_wind_gusts
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_gusts_chart.return }}
      filename: wind_gusts_readings_over_time.html

  # - name: Convert wind gusts html to png
  #   id: wind_gusts_png 
  #   task: html_to_png
  #   partial:
  #     output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
  #     config:
  #       wait_for_timeout: 1000
  #     html_path: ${{ workflow.persist_wind_gusts.return }}

  # Draw soil temperature chart, persist and add widgets
  - name: Draw soil temperature chart 
    id: soil_temp_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: soil_temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist soil temperature chart as text
    id: persist_soil_temp
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.soil_temp_chart.return }}
      filename: soil_temperature_readings_over_time.html

  # - name: Convert soil temperature html to png
  #   id: soil_temp_png 
  #   task: html_to_png
  #   partial:
  #     output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
  #     config:
  #       wait_for_timeout: 1000
  #     html_path: ${{ workflow.persist_soil_temp.return }}

  # Draw relative humidity and persist
  - name: Draw relative humidity chart
    id: rel_humidity_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: relative_humidity
      category_column: weather_station
      line_kwargs:
