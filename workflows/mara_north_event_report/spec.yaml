  - name: Persist temperature chart as text
    id: persist_temperature
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.temperature_chart.return }}
      filename: temperature_readings_over_time.html

  # - name: Convert temperature html to png
  #   id: temperature_png 
  #   task: html_to_png
  #   partial:
  #     output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
  #     config:
  #       wait_for_timeout: 1000
  #     html_path: ${{ workflow.persist_temperature.return }}

  # Draw wind speed  chart, persist and add widgets
  - name: Draw wind speed chart 
    id: wind_speed_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_speed
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
