        - arrival_or_departure

  - name: Replace camp_lodge nulls with other
    id: replace_camp_lodge_nulls
    task: replace_missing_with_label
    partial:
      df: ${{ workflow.remove_air_brackets.return }}
      column_name: camp_lodge
      label: other

  - name: Convert number_of_clients col to int
    id: convert_clients_int 
    task: convert_to_int
    partial: 
      df: ${{ workflow.replace_camp_lodge_nulls.return }}
      columns: 
        - number_of_clients
      errors: coerce 
      fill_value: 0
      inplace: false 

  - name: Convert airstrip lodge to sentence case 
    id: lodge_scase
    task: to_sentence_case
    partial:
      df: ${{ workflow.convert_clients_int.return }}
      column: camp_lodge

  - name: Airstrip operations summary table
    id: airstrip_summary_table 
    task: summarize_df 
    partial:
      df: ${{ workflow.lodge_scase.return }}
      groupby_cols:
        - camp_lodge
        - arrival_or_departure
      summary_params:
        - display_name: no_of_passengers 
          aggregator: sum 
          column: number_of_clients
          decimal_places: 0 
      reset_index: true 

  - name: Pivot summary table 
    id: pivot_airstrip_table 
    task: pivot_df 
    partial:
      df: ${{ workflow.airstrip_summary_table.return }}
      index_col: camp_lodge
      columns_col: arrival_or_departure
      values_col: no_of_passengers
      reset_idx: true 

  - name: Perist airstrip operations summary table 
    id: persist_airstrip_summary 
    task: persist_df
    partial:  
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.pivot_airstrip_table.return }}
      filename: airstrip_arrivals_and_departure

  # create context and persist outputs on the word doc 
  - name: Generate mnc word doc report 
    id: generate_mnc_word_doc
    task: generate_mnc_report 
    partial:  
      template_path: ${{ workflow.persist_mnc_tpt.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      generated_by: Ecoscope
      validate_images: true 
      box_h_cm: 6.5
      box_w_cm: 11.11
      time_period: ${{ workflow.time_range.return }}
      filename: mara_north_conservancy_comprehensive_report.docx

  - name: MNC event report dashboard
    id: mnc_events_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets: []
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}