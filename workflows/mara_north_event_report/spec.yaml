id: mara_north_event_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.14.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.14.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "*"
    channel: file:///tmp/ecoscope-workflows-custom/release/artifacts/

workflow:
  # set workflow details
  - name: Set workflow details
    id: workflow_details
    task: set_workflow_details

  # set time range
  - name: Time range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S %Z"
  
  # define groupers
  - name: Set groupers
    id: groupers
    task: set_groupers
    partial:
      groupers: []

  # connect to ER 
  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  # define base map layers
  - name: Configure base map layers
    id: configure_base_maps
    task: set_base_maps_pydeck

  # Download mnc template and persist
  - name: Download MNC template and persist
    id: persist_mnc_tpt
    task: download_file_and_persist
    partial:
      url: https://www.dropbox.com/scl/fi/wkzd2lm1t5rzidie9wl2j/mara_north_conservancy_report_template_v4.docx?rlkey=os9ffgdk737dc60n568jfrct2&st=zo3i4ovj&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  # Download mnc conservancies gpkg file and persist
  - name: Download MNC community conservancy boundaries
    id: persist_mnc_gpkg
    task: download_file_and_persist
    partial:
      url: https://www.dropbox.com/scl/fi/ahgr1bjv72tdeuiwf3e4h/community-conservancy.gpkg?rlkey=1bla1c9to4nj4y39nnpwpjgsx&st=hj4k3zd7&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  #Load custom shapefiles
  - name : Load local map files
    id: load_local_shapefiles 
    task: load_geospatial_files
    partial:
      config: 
        path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}

  # Create community conservancy map layers 
  - name: Create map layers
    id: create_custom_map_layers
    task: create_map_layers
    partial:
      file_dict: ${{ workflow.load_local_shapefiles.return }}
      style_config:
        styles:
          community_conservancy: 
            stroked: true
            filled: false
            opacity: 0.95
            get_line_color: [105, 105, 105, 200]
            get_line_width: 2.55
        legend:
          label:
            - Conservancy boundaries
          color:
            - "#696969"

  # Clean file key ,select key of interest and create text layer
  - name: Clean file keys from initially loaded geospatial files
    id: clean_local_geo_files
    task: clean_file_keys 
    partial: 
      file_dict: ${{ workflow.load_local_shapefiles.return }}

  - name: Select key area of interest to annotate text layers on the map
    id: filter_aoi
    task: select_koi
    partial:
      file_dict: ${{ workflow.clean_local_geo_files.return }}
      key_value: community_conservancy
  
  - name: Create text layer 
    id: custom_text_layer
    task: make_text_layer
    partial:
      txt_gdf: ${{ workflow.filter_aoi.return }}
      label_column: label
      fallback_columns:
        - name
      use_centroid: true 
      color: [0,0,0,255]
      size: 80
      font_family: Arial
      font_weight: normal
      background: false
      background_color: null
      background_padding: null
      text_anchor: middle
      alignment_baseline: center
      billboard: true
      pickable: true
      tooltip_columns:
        - label 
      target_crs: epsg:4326


  # 1. Weather report 
  # Retrieve observations from ER
  - name: Get subject observations from ER 
    id: subject_observations
    task: get_subjectgroup_observations
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      raise_on_empty: false
      include_details: false
      include_subjectsource_details: false
  
  # Extract precipitation data
  - name: Extract precipitation data
    id: extract_precipitation
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.subject_observations.return }}
      column_name: extra__observation_details
      field_name_options:
        - precipitation
      output_type: float
      output_column_name: precipitation
  
  # Extract temperature data
  - name: Extract temperature data
    id: extract_temperature
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_precipitation.return }}
      column_name: extra__observation_details
      field_name_options:
        - surface_air_temperature
      output_type: float
      output_column_name: temperature
  
  # Extract wind speed data 
  - name: Extract wind speed data
    id: extract_wind_speed
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_temperature.return }}
      column_name: extra__observation_details
      field_name_options:
        - wind_speed
      output_type: float
      output_column_name: wind_speed

  # Extract wind gusts data 
  - name: Extract wind gusts data
    id: extract_wind_gusts
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_wind_speed.return }}
      column_name: extra__observation_details
      field_name_options:
        - wind_gusts
      output_type: float
      output_column_name: wind_gusts

    # Extract soil temperature data 
  - name: Extract soil temperature data
    id: extract_soil_temperature
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_wind_gusts.return }}
      column_name: extra__observation_details
      field_name_options:
        - soil_temperature
      output_type: float
      output_column_name: soil_temperature

    # Extract relative humidity data 
  - name: Extract relative humidity data
    id: extract_relative_humidity
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_soil_temperature.return }}
      column_name: extra__observation_details
      field_name_options:
        - relative_humidity
      output_type: float
      output_column_name: relative_humidity

    # Extract atmospheric pressure data
  - name: Extract atmospheric pressure data
    id: extract_pressure
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_relative_humidity.return }}
      column_name: extra__observation_details
      field_name_options:
        - atmospheric_pressure
      output_type: float
      output_column_name: atmospheric_pressure

  # Extract date
  - name: Extract date
    id: extract_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.extract_pressure.return }}
      column_name: fixtime
      output_type: date
      output_column_name: date
  
  # Rename column
  - name: Rename value grouper columns
    id: rename_grouper_columns
    task: map_columns
    partial:
      df: ${{ workflow.extract_date.return }}
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__subject__name: "weather_station"

  - name: Add temporal index
    id: df_with_temporal_index
    task: add_temporal_index
    partial:
      df: ${{ workflow.rename_grouper_columns.return }}
      time_col: fixtime
      groupers: ${{ workflow.groupers.return }}

  - name: Calculate weather summary table 
    id: daily_weather
    task: summarize_df
    partial:
      df: ${{ workflow.df_with_temporal_index.return }}
      groupby_cols:
        - weather_station
        - date
      summary_params:
        - display_name: precipitation
          aggregator: sum
          column: precipitation

        - display_name: temperature
          aggregator: mean
          column: temperature

        - display_name: wind_speed
          aggregator: mean
          column: wind_speed
        
        - display_name: wind_gusts
          aggregator: max
          column: wind_gusts
        
        - display_name: soil_temperature
          aggregator: mean 
          column: soil_temperature

        - display_name: relative_humidity
          aggregator: mean 
          column: relative_humidity

        - display_name: atmospheric_pressure
          aggregator: mean 
          column: atmospheric_pressure

      reset_index: true

  - name: Perist daily weather summary table 
    id: persist_daily_weather_summary 
    task: persist_df
    partial:  
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.daily_weather.return }}
      filename: weather_summary_table

  # Draw precipitation chart and persist
  - name: Draw precipitation chart
    id: precipitation_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: precipitation
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          showgrid: true
          gridcolor: "#e0e0e0"
          gridwidth: 1
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Precipitation (mm)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist precipitation chart as text
    id: persist_precipitation
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.precipitation_chart.return }}
      filename: precipitation_readings_over_time

  - name: Convert precipitation html to png
    id: precipitation_png 
    task: html_to_png
    partial:
      output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        wait_for_timeout: 200
      html_path: ${{ workflow.persist_precipitation.return }}

  # Draw temperature chart ,persist
  - name: Draw temperature chart
    id: temperature_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist temperature chart as text
    id: persist_temperature
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.temperature_chart.return }}
      filename: temperature_readings_over_time

  - name: Convert temperature html to png
    id: temperature_png 
    task: html_to_png
    partial:
      output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        wait_for_timeout: 200
      html_path: ${{ workflow.persist_temperature.return }}

  # Draw wind speed  chart, persist and add widgets
  - name: Draw wind speed chart 
    id: wind_speed_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_speed
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average wind speed"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind speed chart as text
    id: persist_wind_speed
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_speed_chart.return }}
      filename: wind_speed_readings_over_time

  - name: Convert wind speed html to png
    id: wind_speed_png 
    task: html_to_png
    partial:
      output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        wait_for_timeout: 200
      html_path: ${{ workflow.persist_wind_speed.return }}

  # Draw wind gusts  chart, persist and add widgets
  - name: Draw wind gusts chart 
    id: wind_gusts_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: wind_gusts
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Max wind gusts"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist wind gusts chart as text
    id: persist_wind_gusts
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.wind_gusts_chart.return }}
      filename: wind_gusts_readings_over_time

  - name: Convert wind gusts html to png
    id: wind_gusts_png 
    task: html_to_png
    partial:
      output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        wait_for_timeout: 200
      html_path: ${{ workflow.persist_wind_gusts.return }}

  # Draw soil temperature chart, persist and add widgets
  - name: Draw soil temperature chart 
    id: soil_temp_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: soil_temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist soil temperature chart as text
    id: persist_soil_temp
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.soil_temp_chart.return }}
      filename: soil_temperature_readings_over_time

  - name: Convert soil temperature html to png
    id: soil_temp_png 
    task: html_to_png
    partial:
      output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        wait_for_timeout: 200
      html_path: ${{ workflow.persist_soil_temp.return }}

  # Draw relative humidity and persist
  - name: Draw relative humidity chart
    id: rel_humidity_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: relative_humidity
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average humidity"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist relative humidity chart as text
    id: persist_rel_humidity
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.rel_humidity_chart.return }}
      filename: relative_humidity_readings_over_time

  - name: Convert relative humidity html to png
    id: rel_humidity_png 
    task: html_to_png
    partial:
      output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        wait_for_timeout: 200
      html_path: ${{ workflow.persist_rel_humidity.return }}

  # Draw atmospheric pressure and persist
  - name: Draw atmospheric pressure chart
    id: pressure_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.daily_weather.return }}
      x_column: date
      y_column: atmospheric_pressure
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average pressure"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"

  - name: Persist atmospheric pressure chart as text
    id: persist_pressure
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.pressure_chart.return }}
      filename: atmospheric_pressure_readings_over_time

  - name: Convert atmospheric pressure html to png
    id: pressure_png 
    task: html_to_png
    partial:
      output_dir : ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        wait_for_timeout: 200
      html_path: ${{ workflow.persist_pressure.return }}



  # 2. Patrol Efforts
  # Get all events 
  - name: Get events
    id: get_events_data
    task: get_events
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
      event_types: []
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
  
    # Extract date
  - name: Extract Date
    id: extract_event_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.get_events_data.return }}
      column_name: created_at
      output_type: date
      output_column_name: date

  - name: Add temporal index on events
    id: events_wtemporal
    task: add_temporal_index
    partial:
      df: ${{ workflow.extract_event_date.return }}
      time_col: created_at
      groupers: ${{ workflow.groupers.return }}

  - name: Exclude specific events types from total events
    id: exclude_event_type_values
    task: filter_by_value
    partial:  
      df: ${{ workflow.events_wtemporal.return }}
      column_name: event_type 
      value:
        - distancecountwildlife_rep
        - distancecountpatrol_rep

  # Calculate total events recorded, persist as csv and draw line chart
  - name: Calculate Total Events
    id: total_events_recorded
    task: summarize_df
    partial:
      groupby_cols:
        - date
      summary_params:
        - display_name: no_of_events
          aggregator: nunique
          column: id
      reset_index: true
      df: ${{ workflow.exclude_event_type_values.return }}
  
  - name: Add total row on total events recorded
    id: add_total_events_row
    task: add_totals_row
    partial:
      label_col:
        - date 
      label: Total
      df: ${{ workflow.total_events_recorded.return }}

  - name: Persist total events df 
    id: persist_tevents_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.add_total_events_row.return }}
      filename: total_events_recorded

  - name: Draw total events line chart 
    id: draw_events_chart 
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.total_events_recorded.return }}
      x_column: date 
      y_column: no_of_events
      category_column: null
      line_kwargs:
        shape: "linear"
        color: "lightsteelblue"
      layout_kwargs:
        title: null
        title_x: 0.01
        title_y:  0.95
        showlegend: false
        fontsize: 12
        fontcolor: "#2c3e50"
        plot_bgcolor: "#f5f5f5"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Number of events"
          tickformat: ".1f"
        hovermode: "x unified"

  - name: Persist Total events chart as Text
    id: persist_total_events
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_events_chart.return }}
      filename: total_events_recorded


  - name: MNC event report dashboard
    id: mnc_events_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets: []
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}