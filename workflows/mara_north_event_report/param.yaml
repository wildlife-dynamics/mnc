workflow_details:
  name: "MNC Patrols ,weather report --v7"
  description: "Patrol info weather data."

# Desired time range
time_range:
  since: "2025-07-01T00:00:00Z"
  until: "2025-09-30T23:59:59Z"

# Connect to EarthRanger
er_client_name:
  data_source:
    name: "mnc"

subject_observations:
  subject_group_name: "ER2ER - From GMMF"

foot_trajs:
  trajectory_segment_filter:
    min_length_meters: 0.001
    max_length_meters: 5000.0
    max_time_secs: 14400.0
    min_time_secs: 1.0
    max_speed_kmhr: 9.0
    min_speed_kmhr: 0.5

vehicle_trajs:
  trajectory_segment_filter:
    min_length_meters: 0.35
    max_length_meters: 5000.0
    max_time_secs: 18000.0
    min_time_secs: 1.0
    max_speed_kmhr: 100.0
    min_speed_kmhr: 10.0

motor_trajs:
  trajectory_segment_filter:
    min_length_meters: 0.35
    max_length_meters: 5000.0
    max_time_secs: 18000.0
    min_time_secs: 1.0
    max_speed_kmhr: 100.0
    min_speed_kmhr: 10.0

configure_base_maps:
  base_maps:
    - url: >-
        https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
      opacity: 0.85
      max_zoom: 12 
      min_zoom: null

    - url: >-
        https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}
      opacity: 0.2
      max_zoom: 12
      min_zoom: null
