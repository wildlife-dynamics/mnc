id: wildlife_monitoring_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.39.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.8.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
    
workflow:
  - name: Set workflow details
    id: workflow_details
    task: set_workflow_details

  - name: Time range
    id: time_range
    task: set_time_range
      
  - name: Set groupers
    id: groupers
    task: set_groupers
    partial: 
      groupers: []

  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  - name: Configure base map layers
    id: configure_base_maps
    task: set_base_maps_pydeck
    partial:
      base_maps:
        - url: >-
            https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
          opacity: 1
          max_zoom: 20

  - name: Download MNC community conservancy boundaries
    id: persist_mnc_gpkg
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/14rcy4lkwp7xgewj3xf7k/mnc_conservancy.gpkg?rlkey=mtqo7ivxrnvjonm2z1zez6h6f&st=gtdi4vv0&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name: Download MNC Parcels gpkg
    id: download_mnc_parcels
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/33rdzy896rh91gtkfs2j3/mnc_across_the_river_parcels.gpkg?rlkey=xima1v0rozc0h9h78esfogx6q&st=o3gkk5p1&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name : Load community conservancy boundaries  
    id: load_comm_shp 
    task: load_df
    partial:
      file_path: ${{ workflow.persist_mnc_gpkg.return }}
      layer: null
      deserialize_json: false

  - name: Split loaded gdf by various grazing zones and blocks
    id: split_gdf_by_zone
    task: split_gdf_by_column
    partial:  
      gdf: ${{ workflow.load_comm_shp.return }}
      column: grazing_zone

  - name: Annotate community conservancy gpkg with geom type 
    id: annotate_comm_gdf_dict 
    task: annotate_gdf_dict_with_geom_type 
    partial:
      gdf_dict: ${{ workflow.split_gdf_by_zone.return }}

  - name: Create styled layers from split mnc zones
    id: create_mnc_styled_layers
    task: create_deckgl_layers_from_gdf_dict
    partial:
      gdf_dict: ${{ workflow.annotate_comm_gdf_dict.return }}
      styles:
        Conservancy:
          extruded: false
          get_fill_color: [169, 169, 169]
          get_line_color: [169, 169, 169]
          get_line_width: 4.00
          stroked: true
          filled: false
          opacity: 0.95

        Conservancy Herd Zone:
          extruded: false
          get_fill_color: [173, 255, 47]
          get_line_color: [173, 255, 47]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 1:
          extruded: false
          get_fill_color: [85, 107, 47]
          get_line_color: [85, 107, 47]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 2:
          extruded: false
          get_fill_color: [0, 139, 139]
          get_line_color: [0, 139, 139]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 3:
          extruded: false
          get_fill_color: [0, 100, 0]
          get_line_color: [0, 100, 0]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 4:
          extruded: false
          get_fill_color: [143, 188, 139]
          get_line_color: [143, 188, 139]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

      legends:
        title: Legend
        values: 
          - label: Conservancy
            color: "#a9a9a9"
          - label: Conservancy Herd Zone
            color: "#adff2f"
          - label: Grazing Zone 1
            color: "#556b2f"
          - label: Grazing Zone 2
            color: "#008b8b"
          - label: Grazing Zone 3
            color: "#006400"
          - label: Grazing Zone 4
            color: "#8fbc8b"

  - name: Create conservancy boundaries
    id: create_conservancy_boundaries
    task: create_deckgl_layers_from_gdf_dict
    partial:
      gdf_dict: ${{ workflow.annotate_comm_gdf_dict.return }}
      styles:
        Conservancy:
          extruded: false
          get_fill_color: [169, 169, 169]
          get_line_color: [169, 169, 169]
          get_line_width: 4.00
          stroked: true
          filled: false
          opacity: 0.95

      legends:
        title: Legend 
        values: 
          - label: Boundaries
            color: "#a9a9a9"

  - name: Create conservancy gdf from split dict 
    id: conservancy_gdf
    task: create_gdf_from_dict
    partial: 
      gdf_dict: ${{ workflow.split_gdf_by_zone.return }}
      key: Conservancy

  - name: Create group ranch gdf from loaded gdf
    id: overall_grazing_zones
    task: filter_df 
    partial: 
      column_name: grazing_zone
      op: ne
      value: Conservancy 
      df: ${{ workflow.load_comm_shp.return }}
      reset_index: false

  - name: Create conservancy text layers here 
    id: conservancy_text_layer
    task: create_custom_text_layer 
    partial: 
      geodataframe: ${{ workflow.conservancy_gdf.return }}
      layer_style: 
        get_text: name 
        get_color: [0,0,0,255]
        
        get_size: 1500
        size_units: meters 
        size_min_pixels: 70 #65 
        size_max_pixels: 100
        size_scale: 2.25 

        font_family: Calibri 
        font_weight: "700" 
        get_text_anchor: middle 
        get_alignment_baseline: center
        billboard: true 

        background_padding: [4,8]
        pickable: true 
        auto_highlight: false 
      use_centroid: true 
      legend: null 

  - name: Load mnc parcels 
    id: load_mnc_parcels 
    task: load_df 
    partial:
      file_path: ${{ workflow.download_mnc_parcels.return }}
      layer: null
      deserialize_json: false

  - name: Assign geom type to mnc parcels 
    id: assign_mnc_geom
    task: get_gdf_geom_type 
    partial:
      gdf: ${{ workflow.load_mnc_parcels.return }}

  - name: Create mnc parcels layers 
    id: create_mnc_parcels_layers 
    task: create_deckgl_layer_from_gdf 
    partial:
      gdf: ${{ workflow.assign_mnc_geom.return }}
      style: 
        extruded: false
        get_fill_color: [189, 183, 107]
        get_line_color: [189, 183, 107]
        get_line_width: 1.95
        stroked: true 
        filled: true 
        opacity: 0.15
      legend: 
        title: ""
        values: 
          - label: Parcels
            color: "#bdb76b"

  # Events 
  - name: Retrieve all events 
    id: get_events_data
    task: get_events
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
        - patrols
      event_types: []
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: false

  # Extract date
  - name: Extract date from events data
    id: extract_event_date
    task: extract_column_as_type
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.get_events_data.return }}
      column_name: time
      output_type: date
      output_column_name: date

  - name: Add temporal index on events
    id: events_temporal
    task: add_temporal_index
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_event_date.return }}
      time_col: date
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  # global zoom value 
  - name: Global map zoom value
    id: global_zoom_value
    task: view_state_deck_gdf
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.overall_grazing_zones.return }}

  - name: Filter wildlife incident event types
    id: filter_wildlife_events
    task: filter_row_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      df: ${{ workflow.events_temporal.return }}
      column: event_type
      values: 
        - snare_rep
        - fire_rep 
        - wildlife_injury_rep
        - wildlife_treatment_rep
        - wildlife_carcass_rep
        - illegal_grazing_rep # new 

  - name: Normalize wildlife events 
    id: normalize_wildlife_events 
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      column: event_details 
      df: ${{ workflow.filter_wildlife_events.return }}
      skip_if_not_exists: true 
      sort_columns: true

  - name: Rename wildlife events columns 
    id: rename_wildlife_cols
    task: transform_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        event_details__wildlifecarcass_species: wildlife_carcass_species
        event_details__wildlifecarcass_suspectedcause: wildlife_carcass_suspected_cause
        event_details__wildlifecarcass_visibleinjury: wildlife_carcass_visible_injury
        event_details__wildlifetreatment_species: wildlife_treatment_species
        event_details__wildlifetreatment_comments: wildlife_treatment_comments
        event_details__wildlifetreatment_vetattending: wildlife_treatment_vet_attending
        event_details__wildlifetreatment_vetprognosis: wildlife_treatment_vet_prognosis
        event_details__wildlifecarcass_comments: wildlife_carcass_comments
      skip_missing_rename: true 
      required_columns: []
      df: ${{ workflow.normalize_wildlife_events.return }}
  
  - name: Persist  wildlife events as csv 
    id: persist_wildlife_csv
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      filename: wildlife_events_recorded
      df: ${{ workflow.rename_wildlife_cols.return }}

  - name: Persist  wildlife events as gpkg
    id: persist_wildlife_gpkg
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: gpkg
      filename: wildlife_events_recorded
      df: ${{ workflow.rename_wildlife_cols.return }}

  - name: Generate wildlife summary table 
    id: generate_wild_summary 
    task: make_wildlife_summary_table
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.rename_wildlife_cols.return }}
      value_map: 
        fire_rep: Fire
        snare_rep: Snare 
        wildlife_carcass_rep: Wildlife carcass 
        wildlife_injury_rep: Injured wildlife
        wildlife_treatment_rep: Veterinary treatment
        illegal_grazing_rep: Illegal grazing
      max_unique: 6 
      shorten_width: 300 
      order: null 
  
  - name: Persist wildlife summary 
    id: persist_wildlife_df
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: wildlife_incidents_summary_table 
      filetype: csv 
      df: ${{ workflow.generate_wild_summary.return }}

  - name: Calculate wildlife events recorded by date
    id: wildlife_events_recorded
    task: summarize_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      groupby_cols:
        - date
      summary_params:
        - display_name: no_of_events
          aggregator: nunique
          column: id
      reset_index: true
      df: ${{ workflow.rename_wildlife_cols.return }}
  
  - name: Add total row on wildlife events recorded
    id: add_total_wildlife
    task: add_totals_row
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      label_col:
        - date 
      label: Total
      df: ${{ workflow.wildlife_events_recorded.return }}

  - name: Persist wildlife events by date
    id: wildlife_events_df
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.add_total_wildlife.return }}
      filename: wildlife_incidents_recorded_by_date

  # Draw map 
  - name: Exclude geom outliers from wildlife events 
    id: exclude_wildlife_events_outliers
    task: exclude_geom_outliers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.rename_wildlife_cols.return }}
      z_threshold: 3

  - name: Remove invalid points from wildlife events 
    id: remove_wildlife_invalid_geoms 
    task: ecoscope_workflows_ext_custom.tasks.transformation.drop_null_geometry
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      gdf: ${{ workflow.exclude_wildlife_events_outliers.return }}
      geometry_column: geometry 

  - name: Apply Colormap to wildlife predation events
    id: apply_wildlife_colormap
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      input_column_name: event_type
      output_column_name: colors
      colormap: tab20
      df: ${{ workflow.remove_wildlife_invalid_geoms.return }}
  
  - name: Map wildlife values 
    id: map_wildlife_values
    task: map_column_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.apply_wildlife_colormap.return }}
      columns: 
        - event_type
      value_map: 
        fire_rep: Fire
        snare_rep: Snare 
        wildlife_carcass_rep: Wildlife carcass 
        wildlife_injury_rep: Injured wildlife
        wildlife_treatment_rep: Veterinary treatment
        illegal_grazing_rep: Illegal grazing
      inplace: true 

  - name: Generate wildlife predation point layers
    id: generate_wildlife_layers
    task: create_scatterplot_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: colors
        get_line_color: colors
        get_radius: 4
        opacity: 0.75
        stroked: true
      legend:
        title: Incidents
        label_column: event_type
        color_column: colors
        sort: ascending
      geodataframe: ${{ workflow.map_wildlife_values.return }}

  - name: Combine styled layers with wildlife incident events 
    id: combine_custom_wildlife
    task: combine_deckgl_map_layers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      static_layers: 
        - ${{ workflow.create_conservancy_boundaries.return }}
        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}
      grouped_layers: ${{ workflow.generate_wildlife_layers.return }}

  - name: Draw wildlife incident predation map
    id: draw_wildlife_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_custom_wildlife.return }}
      view_state: ${{ workflow.global_zoom_value.return }} 

  - name: Persist wildlife predation map HTML paths
    id: persist_wildlife_urls
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_wildlife_map.return }}
      filename: wildlife_incidents_map.html 

  # Wildlife sighting 
  # Elephants 
  - name: Retrieve elephant events
    id: retrieve_elephant_events 
    task: filter_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      column_name: event_type
      op: equal 
      value: elephant_sighting_rep
      df: ${{ workflow.events_temporal.return }}
      reset_index: false

  - name: Normalize elephant event details column
    id: normalize_elephant_values
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column: event_details
      df: ${{ workflow.retrieve_elephant_events.return }}
      skip_if_not_exists: true 
      sort_columns: true

  - name: Rename elephant events columns 
    id: rename_elephant_cols
    task: transform_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        event_details__elephantsight_male: elephant_sight_male
        event_details__elephantsight_female: elephant_sight_female
        event_details__elephantsight_comments: elephant_sight_comments
        event_details__elephantsight_herdsize: elephant_sight_herd_size
        event_details__elephantsight_subadult: elephant_sight_sub_adult
        event_details__elephantsight_herdcomposition: elephant_sight_herd_composition
        event_details__elephantsight_underayear: elephant_sight_under_a_year
      skip_missing_rename: true 
      required_columns:
        - event_details__elephantsight_herdcomposition
      df: ${{ workflow.normalize_elephant_values.return }}

  - name: Replace elephant herds with unspecified 
    id: replace_elephant_nulls 
    task: replace_missing_with_label
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.rename_elephant_cols.return }}
      columns: 
        - elephant_sight_herd_composition 
      label: unspecified 

  - name: Rename values in elephant sight herd composition column 
    id: rename_ele_column 
    task: map_column_values 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      df: ${{ workflow.replace_elephant_nulls.return }}
      columns :
        - elephant_sight_herd_composition
      value_map:
        bachelor: Bachelor 
        femalecalf: Female/calf
        mixed: Mixed 
        unspecified: Unspecified
      inplace: true 

  - name: Elephant events summary table 
    id: elephant_summary
    task: summarize_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      groupby_cols:
        - event_type
      summary_params:
        - display_name: no_of_events
          aggregator: nunique
          column: id 
      reset_index: true
      df: ${{ workflow.rename_ele_column.return }}

  - name: Add totals row in elephant events  summary table
    id: include_elephant_totals
    task: add_totals_row
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      label_col: 
        - event_type
      label: Total
      df: ${{ workflow.elephant_summary.return }}

  - name: Persist elephant summary table 
    id: persist_ele_df
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      filename: elephant_events_recorded
      df: ${{ workflow.include_elephant_totals.return }}

  # Draw elephant herd composition map
  - name: Exclude geom outliers fom elephant events
    id: exclude_ele_outliers
    task: exclude_geom_outliers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.rename_ele_column.return }}
      z_threshold: 3

  - name: Remove invalid points from elephant events
    id: remove_ele_invalid_geoms 
    task: ecoscope_workflows_ext_custom.tasks.transformation.drop_null_geometry
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      gdf: ${{ workflow.exclude_ele_outliers.return }}
      geometry_column: geometry 

  - name: Apply Colormap to elephant events 
    id: apply_ele_events_colormap
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      input_column_name: elephant_sight_herd_composition
      output_column_name: colors
      colormap: tab20
      df: ${{ workflow.rename_ele_column.return }}
  
  - name: Generate elephant sighting point layers
    id: generate_elephant_layers
    task: create_scatterplot_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: colors
        get_line_color: colors
        get_radius: 4
        opacity: 0.75
        stroked: true
      legend:
        title: Herd Types 
        label_column: elephant_sight_herd_composition
        color_column: colors
        sort: ascending
      geodataframe: ${{ workflow.apply_ele_events_colormap.return }}

  - name: Combine custom loaded map layers and elephant point layers
    id: combine_custom_ele
    task: combine_deckgl_map_layers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      static_layers: 
        - ${{ workflow.create_conservancy_boundaries.return }}
        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}

      grouped_layers: ${{ workflow.generate_elephant_layers.return }}

  - name: Draw elephant pydeck map 
    id: draw_elephant_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_custom_ele.return }}
      view_state: ${{ workflow.global_zoom_value.return }} 

  - name: Persist elephant events  map HTML paths
    id: persist_elephant_urls
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_elephant_map.return }}
      filename: elephant_sightings_events.html 

  - name: Generate herd composition summary table 
    id: elephant_herd_summary 
    task: summarize_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      groupby_cols:
