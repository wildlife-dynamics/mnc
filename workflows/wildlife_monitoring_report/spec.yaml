        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}

      grouped_layers: ${{ workflow.generate_giraffe_layers.return }}

  - name: Draw giraffe events sighting map
    id: draw_giraffe_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_giraffe_events.return }}
      view_state: ${{ workflow.global_zoom_value.return }} 

  - name: Persist giraffe events map HTML paths
    id: persist_giraffe_urls
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_giraffe_map.return }}
      filename: giraffe_sighting_map.html 

    # Hartebeest
  - name: Retrieve hartebeest events 
    id: filter_hb_events
    task: filter_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      column_name: event_type	
      op: equal
      value: hartebeest_sighting
      df: ${{ workflow.events_temporal.return }}
      reset_index: false

  - name: Normalize event details columns 
    id: normalize_hb_values
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column: event_details
      df: ${{ workflow.filter_hb_events.return }}
      skip_if_not_exists: true 
      sort_columns: true
  
  # draw hartebeest events sighting 
  - name: Exclude geom outliers from hartebeest events
    id: exclude_hb_outliers
    task: exclude_geom_outliers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.normalize_hb_values.return }}
      z_threshold: 3

  - name: Remove invalid points from hartebeest events
    id: remove_hb_invalid_geoms
    task: ecoscope_workflows_ext_custom.tasks.transformation.drop_null_geometry
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      gdf: ${{ workflow.exclude_hb_outliers.return }}
      geometry_column: geometry 

  - name: Generate hartebeest sighting point layers 
    id: generate_hb_layers 
    task: create_scatterplot_layer
    skipif:
      conditions: 
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: [135, 206, 250] 
        get_line_color: [135, 206, 250]
        get_radius : 4
        opacity: 0.75
        stroked: true 
      legend: 
        title: "Hartebeest Sightings"
        values: 
          - label: Sighting 
            color: "#87cefa"
      geodataframe: ${{ workflow.remove_hb_invalid_geoms.return }}

  - name: Combine styled layers with hartebeest events 
    id: combine_hb_events
    task: combine_deckgl_map_layers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      static_layers: 
        - ${{ workflow.create_conservancy_boundaries.return }}
        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}

      grouped_layers: ${{ workflow.generate_hb_layers.return }}

  - name: Draw hartebeest events sighting map
    id: draw_hb_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_hb_events.return }}
      view_state: ${{ workflow.global_zoom_value.return }} 

  - name: Persist hartebeest events map HTML paths
    id: persist_hb_urls
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_hb_map.return }}
      filename: hartebeest_sighting_map.html  

