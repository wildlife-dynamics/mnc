id: customized_report
requirements:
  - name: ecoscope-workflows-core
    version: "*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.5.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "*"
    channel: file:///tmp/ecoscope-workflows-custom/release/artifacts/


workflow:
  # set workflow details
  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details

  # set time range
  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S %Z"
  
  # define groupers
  - name: Set Groupers
    id: groupers
    task: set_groupers

  # connect to ER 
  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  # define base map layers
  - name: Configure Base Map Layers
    id: configure_base_maps
    task: set_base_maps

  # 1. Weather report 
  # Retrieve observations from ER
  - name: Get subject observations from ER 
    id: subject_observations
    task: get_subjectgroup_observations
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      raise_on_empty: false
      include_details: false
      include_subjectsource_details: false
  
  # Extract precipitation data
  - name: Extract Precipitation Data
    id: extract_precipitation
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.subject_observations.return }}
      column_name: extra__observation_details
      field_name_options:
        - precipitation
      output_type: float
      output_column_name: precipitation
  
  # Extract temperature data
  - name: Extract Temperature Data
    id: extract_temperature
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.extract_precipitation.return }}
      column_name: extra__observation_details
      field_name_options:
        - surface_air_temperature
      output_type: float
      output_column_name: temperature
  
  # Extract date
  - name: Extract Date
    id: extract_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.extract_temperature.return }}
      column_name: fixtime
      output_type: date
      output_column_name: date
  
  # Rename column
  - name: Rename value grouper columns
    id: rename_grouper_columns
    task: map_columns
    partial:
      df: ${{ workflow.extract_date.return }}
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__subject__name: "weather_station"

  - name: Add temporal index
    id: df_with_temporal_index
    task: add_temporal_index
    partial:
      df: ${{ workflow.rename_grouper_columns.return }}
      time_col: fixtime
      groupers: ${{ workflow.groupers.return }}

  - name: Split by Group
    id: split_weather_groups
    task: split_groups
    partial:
      df: ${{ workflow.df_with_temporal_index.return }}
      groupers: ${{ workflow.groupers.return }}
  
  - name: Calculate Daily Summary
    id: daily_weather
    task: summarize_df
    partial:
      groupby_cols:
        - weather_station
        - date
      summary_params:
        - display_name: daily_precipitation
          aggregator: sum
          column: precipitation
        - display_name: daily_temperature
          aggregator: mean
          column: temperature
      reset_index: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_weather_groups.return }}

  - name: Draw Precipitation Chart
    id: precipitation_chart
    task: draw_line_chart
    partial:
      x_column: date
      y_column: daily_precipitation
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: "Precipitation by Station"
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#222222"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Precipitation (mm)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"
    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.daily_weather.return }}

  - name: Persist Precipitation Chart as Text
    id: persist_precipitation
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.precipitation_chart.return }}

  - name: Create Precipitation Widget
    id: precipitation_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Daily Precipitation by Station"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_precipitation.return }}

  - name: Merge Precipitation Widget Views
    id: grouped_precipitation_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.precipitation_chart_widget.return }}

  - name: Draw Temperature Chart
    id: temperature_chart
    task: draw_line_chart
    partial:
      x_column: date
      y_column: daily_temperature
      category_column: weather_station
      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: "Temperature by Station"
        title_x: 0.01
        title_y:  0.95
        showlegend: true
        fontsize: 12
        fontcolor: "#222222"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Average Temperature (°C)"
          tickformat: ".1f"
        legend_title: "Weather Station"
        hovermode: "x unified"
    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.daily_weather.return }}

  - name: Persist Temperature Chart as Text
    id: persist_temperature
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.temperature_chart.return }}
      
  - name: Create Temperature Widget
    id: temperature_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Daily Temperature by Station"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_temperature.return }}

  - name: Merge Temperature Widget Views
    id: grouped_temperature_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.temperature_chart_widget.return }}

  # 2. Patrol Efforts
  # Patrol effort section
  - name: Get events
    id: get_events_data
    task: get_events
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at

      raise_on_empty: false
      include_details: true
      include_updates: false
      include_related_events: false
  
    # Extract date
  - name: Extract Date
    id: extract_event_date
    task: extract_column_as_type
    partial:
      df: ${{ workflow.get_events_data.return }}
      column_name: created_at
      output_type: date
      output_column_name: date

  - name: Add temporal index on events
    id: events_wtemporal
    task: add_temporal_index
    partial:
      df: ${{ workflow.extract_event_date.return }}
      time_col: created_at
      groupers: ${{ workflow.groupers.return }}

  - name: Split events by group
    id: split_event_groups
    task: split_groups
    partial:
      df: ${{ workflow.events_wtemporal.return }}
      groupers: ${{ workflow.groupers.return }}

    # create summary table 
  - name: Calculate Total Events
    id: total_events_recorded
    task: summarize_df
    partial:
      groupby_cols:
        - date
      summary_params:
        - display_name: no_of_events
          aggregator: nunique
          column: id
      reset_index: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_event_groups.return }}
  
  - name: Persist total events df 
    id: persist_tevents_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.total_events_recorded.return }}

  - name: Draw total events line chart 
    id: draw_events_chart 
    task: draw_line_chart
    partial:
      x_column: date 
      y_column: no_of_events

      line_kwargs:
        shape: "linear"
      layout_kwargs:
        title: "Total events recorded"
        title_x: 0.01
        title_y:  0.95
        showlegend: false
        fontsize: 12
        fontcolor: "#222222"
        xaxis:
          title: "Date"
          tickformat: "%Y-%m-%d"
          tickangle: -45
          rangemode: auto
        yaxis:
          title: "Count"
          tickformat: ".1f"
        hovermode: "x unified"

    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.total_events_recorded.return }}
    
  - name: Persist Total events chart as Text
    id: persist_total_events
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.draw_events_chart.return }}

  - name: Create Total Events Widget
    id: tevents_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Total Events"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_total_events.return }}

  - name: Merge total events Widget Views
    id: grouped_tevents_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.tevents_chart_widget.return }}

  - name: Get Patrol observations
    id: patrol_observations
    task: get_patrol_observations
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      include_patrol_details: true
      raise_on_empty: true

  - name: Transform observations to relocations 
    id: patrol_relocs
    task: process_relocations
    partial:
      observations: ${{ workflow.patrol_observations.return }}
      relocs_columns:
        - extra__id
        - extra__created_at
        - extra__subject_id
        - geometry
        - groupby_col
        - fixtime
        - junk_status
        - patrol_id
        - patrol_title
        - patrol_serial_number
        - patrol_start_time
        - patrol_end_time
        - patrol_type
        - patrol_status
        - patrol_subject
        - patrol_type__value
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Convert Relocations to Trajectories
    id: convert_to_trajectories
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.patrol_relocs.return }}

  - name: Add Temporal Index to Trajectories
    id: add_temporal_index_to_traj
    task: add_temporal_index
    partial:
      df: ${{ workflow.convert_to_trajectories.return }}
      time_col: segment_start
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  - name: Map patrol types correctly
    id: map_patrol_types
    task: classify_mnc_patrol
    partial:
      df: ${{ workflow.add_temporal_index_to_traj.return }}
      patrol_col: extra__patrol_type__value
      new_col: patrol_cat_types

  - name: Rename traj columns
    id: rename_traj_cols
    task: map_columns
    partial:
      drop_columns:
        - heading
        - extra__created_at
        - extra__id 
      retain_columns: []
      rename_columns:
        extra__patrol_start_time: patrol_start_time
        extra__patrol_end_time: patrol_end_time
        extra__patrol_id: patrol_id
        extra__patrol_serial_number: patrol_serial_number
        extra__patrol_status: patrol_status
        extra__patrol_subject: patrol_subject_name
        extra__patrol_title: patrol_title 
        extra__patrol_type: patrol_type_id
        extra__patrol_type__value: patrol_type_value 
        extra__subject_id: subject_id

      df: ${{ workflow.map_patrol_types.return }}

    # split subject trajectories into groups based on grouping strategy
  - name: Split Trajectories by Group
    id: split_trajectories_by_group
    task: split_groups
    partial:
      df: ${{ workflow.rename_traj_cols.return }}
      groupers: ${{ workflow.groupers.return }}


  - name: Filter foot patrol data 
    id: filter_foot_patrols
    task: filter_by_value
    partial:
      column_name: patrol_cat_types
      value:  Foot
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_trajectories_by_group.return }}

  - name: Apply Colormap to foot patrol
    id: apply_footp_colormap
    task: apply_color_map
    partial:
      input_column_name: patrol_type_value
      output_column_name: patrol_colormap
      colormap: coolwarm
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.filter_foot_patrols.return }}

  - name: Generate  foot patrol layers
    id: generate_footp_layers
    task: create_polyline_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        color_column: patrol_colormap
      legend:
        label_column: patrol_type_value
        color_column: patrol_colormap
      tooltip_columns:
        - patrol_subject_name
        - patrol_start_time
        - patrol_end_time
        - patrol_title
        - patrol_type_value
        - segment_start
        - dist_meters
        - timespan_seconds

    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.apply_footp_colormap.return }}

  - name: Zoom  foot patrol trajs by view state
    id: zoom_footp_traj_view
    task: create_view_state_from_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.apply_footp_colormap.return }}

  - name: Zip foot patrol layers and zoom values
    id: zip_footp_zoom_values
    task: zip_grouped_by_key
    partial:
      left:  ${{ workflow.generate_footp_layers.return }}
      right: ${{ workflow.zoom_footp_traj_view.return }} 

  - name: Draw  foot patrol ecomaps
    id: draw_footp_ecomap
    task: draw_ecomap
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      north_arrow_style:
        placement: top-left
      legend_style:
        placement: bottom-right
        title: Patrol Types
      static: false
      title: null
      max_zoom: 20
    mapvalues:
      argnames: 
        - geo_layers
        - view_state
      argvalues: ${{ workflow.zip_footp_zoom_values.return }}

  - name: Persist  foot patrol ecomap html paths
    id: persist_footp_ecomap_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.draw_footp_ecomap.return }}

  - name: Create foot patrol widgets
    id: create_footp_widgets
    task: create_map_widget_single_view
    skipif:
      conditions: 
        - never
    partial:
      title: Foot Patrol
    map:
      argnames:
        - view 
        - data
      argvalues: ${{ workflow.persist_footp_ecomap_urls.return }}

  - name: Merge foot patrol ecomap widgets
    id: merge_footp_widgets
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.create_footp_widgets.return }}


  - name: Filter vehicle patrol data 
    id: filter_vehicle_patrols
    task: filter_by_value
    partial:
      column_name: patrol_cat_types
      value: Vehicle
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_trajectories_by_group.return }}

  - name: Apply Colormap to vh patrol
    id: apply_vhp_colormap
    task: apply_color_map
    partial:
      input_column_name: patrol_type_value
      output_column_name: patrol_colormap
      colormap: coolwarm
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.filter_vehicle_patrols.return }}

  - name: Generate vehicle patrol layers
    id: generate_vhp_layers
    task: create_polyline_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        color_column: patrol_colormap
      legend:
        label_column: patrol_type_value
        color_column: patrol_colormap
      tooltip_columns:
        - patrol_subject_name
        - patrol_start_time
        - patrol_end_time
        - patrol_title
        - patrol_type_value
        - segment_start
        - dist_meters
        - timespan_seconds

    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.apply_vhp_colormap.return }}

  - name: Zoom vehicle patrol trajs by view state
    id: zoom_vhp_traj_view
    task: create_view_state_from_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.apply_vhp_colormap.return }}

  - name: Zip vehicle patrol layers and zoom values
    id: zip_vhp_zoom_values
    task: zip_grouped_by_key
    partial:
      left:  ${{ workflow.generate_vhp_layers.return }}
      right: ${{ workflow.zoom_vhp_traj_view.return }} 

  - name: Draw vehicle patrol ecomaps
    id: draw_vhp_ecomap
    task: draw_ecomap
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      north_arrow_style:
        placement: top-left
      legend_style:
        placement: bottom-right
        title: Patrol Types
      static: false
      title: null
      max_zoom: 20
    mapvalues:
      argnames: 
        - geo_layers
        - view_state
      argvalues: ${{ workflow.zip_vhp_zoom_values.return }}

  - name: Persist vehicle patrol ecomap html paths
    id: persist_vhp_ecomap_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.draw_vhp_ecomap.return }}

  - name: Create vehicle patrol widgets
    id: create_vhp_widgets
    task: create_map_widget_single_view
    skipif:
      conditions: 
        - never
    partial:
      title: Vehicle Patrol
    map:
      argnames:
        - view 
        - data
      argvalues: ${{ workflow.persist_vhp_ecomap_urls.return }}

  - name: Merge vehicle patrol ecomap widgets
    id: merge_vhp_widgets
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.create_vhp_widgets.return }}

  - name: Filter motorbike patrol data 
    id: filter_motor_patrols
    task: filter_by_value
    partial:
      column_name: patrol_cat_types
      value: Motorcycle
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_trajectories_by_group.return }}


  - name: Apply Colormap to motorcycle patrol
    id: apply_mocp_colormap
    task: apply_color_map
    partial:
      input_column_name: patrol_type_value
      output_column_name: patrol_colormap
      colormap: coolwarm
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.filter_motor_patrols.return }}

  - name: Generate motor patrol layers
    id: generate_mocp_layers
    task: create_polyline_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        color_column: patrol_colormap
      legend:
        label_column: patrol_type_value
        color_column: patrol_colormap
      tooltip_columns:
        - patrol_subject_name
        - patrol_start_time
        - patrol_end_time
        - patrol_title
        - patrol_type_value
        - segment_start
        - dist_meters
        - timespan_seconds

    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.apply_mocp_colormap.return }}

  - name: Zoom motor patrol trajs by view state
    id: zoom_mocp_traj_view
    task: create_view_state_from_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.apply_mocp_colormap.return }}

  - name: Zip motor patrol layers and zoom values
    id: zip_mocp_zoom_values
    task: zip_grouped_by_key
    partial:
      left:  ${{ workflow.generate_mocp_layers.return }}
      right: ${{ workflow.zoom_mocp_traj_view.return }} 

  - name: Draw motor patrol ecomaps
    id: draw_mocp_ecomap
    task: draw_ecomap
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      north_arrow_style:
        placement: top-left
      legend_style:
        placement: bottom-right
        title: Patrol Types
      static: false
      title: null
      max_zoom: 20
    mapvalues:
      argnames: 
        - geo_layers
        - view_state
      argvalues: ${{ workflow.zip_mocp_zoom_values.return }}

  - name: Persist motor patrol ecomap html paths
    id: persist_mocp_ecomap_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.draw_mocp_ecomap.return }}

  - name: Create motor patrol widgets
    id: create_mocp_widgets
    task: create_map_widget_single_view
    skipif:
      conditions: 
        - never
    partial:
      title: Motorbike Patrol
    map:
      argnames:
        - view 
        - data
      argvalues: ${{ workflow.persist_mocp_ecomap_urls.return }}

  - name: Merge motor patrol ecomap widgets
    id: merge_mocp_widgets
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.create_mocp_widgets.return }}

  - name: Compute patrol coverage 
    id: patrol_grid_visits
    task: create_patrol_coverage_grid
    partial:
      grid_cell_size: 1000
    mapvalues:
      argnames: trajs
      argvalues: ${{ workflow.split_trajectories_by_group.return }}

  - name: Apply bin classification on grids
    id: apply_classification_grid
    task: apply_classification
    partial:
      input_column_name: unique_patrol_count
      output_column_name: density_bins 
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.patrol_grid_visits.return }}

  - name: Apply Colormap to patrol grid visits
    id: apply_grid_colormap
    task: apply_color_map
    partial:
      input_column_name: density_bins
      output_column_name: density_colormap
      colormap: Wistia
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.filter_motor_patrols.return }}

  - name: Generate grid layers
    id: generate_grid_layers
    task: create_polygon_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        color_column: density_colormap
      legend:
        label_column: density_bins
        color_column: density_colormap
      tooltip_columns:
        - density_bins
        - density_colormap
        - geometry
        - patrol_id
        - dist_meters
        - timespan_seconds

    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.apply_grid_colormap.return }}

  - name: Zoom grid polygons by view state
    id: zoom_grid_view
    task: create_view_state_from_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.apply_grid_colormap.return }}

  - name: Zip grid layers and zoom values
    id: zip_grid_zoom_values
    task: zip_grouped_by_key
    partial:
      left:  ${{ workflow.generate_grid_layers.return }}
      right: ${{ workflow.zoom_grid_view.return }} 

  - name: Draw grid ecomaps
    id: draw_grid_ecomap
    task: draw_ecomap
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      north_arrow_style:
        placement: top-left
      legend_style:
        placement: bottom-right
        title: Patrol Types
      static: false
      title: null
      max_zoom: 20
    mapvalues:
      argnames: 
        - geo_layers
        - view_state
      argvalues: ${{ workflow.zip_grid_zoom_values.return }}

  - name: Persist grid ecomap html paths
    id: persist_grid_ecomap_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.draw_grid_ecomap.return }}

  - name: Create grid widgets
    id: create_grid_widgets
    task: create_map_widget_single_view
    skipif:
      conditions: 
        - never
    partial:
      title: Patrol Grid Visits
    map:
      argnames:
        - view 
        - data
      argvalues: ${{ workflow.persist_grid_ecomap_urls.return }}

  - name: Merge grid ecomap widgets
    id: merge_grid_widgets
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.create_grid_widgets.return }}

  - name: Filter events and get patrol information records 
    id: filter_patrol_info_events
    task: filter_by_value
    partial:
      column_name: value
      value: patrol_information
    mapvalues: 
      argnames: df
      argvalues: ${{ workflow.split_event_groups.return }}
  
  - name: Normalize event details columns 
    id: normalize_pi_values
    task: normalize_column
    partial:
      column: event_details
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.filter_patrol_info_events.return }}

  - name: Rename patrol information columns
    id: rename_patrolinf_cols
    task: map_columns
    partial:
      drop_columns:
        - event_type
        - event_category
        - priority
        - priority_label
        - attributes
        - comment
        - title
        - reported_by
        - state
        - is_contained_in
        - sort_at
        - icon_id"
        - serial_number
        - url
        - image_url
        - is_collection
        - event_details__updates
        - message
        - end_time
        - provenance
        - updated_at
        - created_at
        - geojson
      retain_columns: []
      rename_columns:
        event_details__participants: participants
        event_details__patrol_purpose : purpose
        event_details__person_who_authorized : authorized_by

      df: ${{ workflow.normalize_pi_values.return }}

  - name: Patrol information Summary
    id: patrol_info_summary
    task: summarize_df
    partial:
      groupby_cols:
        - purpose
      summary_params:
        - display_name: Number of Patrols
          aggregator: count 
          column: id 
      reset_index: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.rename_patrolinf_cols.return }}
  
  - name: Persist patrol 
    id: persist_patrol_df
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.patrol_info_summary.return }}

  - name: Create A Weather Dashboard
    id: weather_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets:
        - ${{ workflow.grouped_precipitation_widget.return }}
        - ${{ workflow.grouped_temperature_widget.return }}
        - ${{ workflow.grouped_tevents_widget.return }}
        - ${{ workflow.merge_footp_widgets.return }}
        - ${{ workflow.merge_vhp_widgets.return }}
        - ${{ workflow.merge_mocp_widgets.return }}
        - ${{ workflow.merge_grid_widgets.return }}
      
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}